<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AppealPro · 申诉专家</title><script src="config.js"></script>
<style>
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;max-width:720px;margin:0 auto;padding:24px;background:#fafaf7;color:#222}
h1{font-size:1.6em;margin-bottom:4px} .tag{color:#777;margin-bottom:20px}
label{display:block;margin:14px 0 4px;font-weight:600;font-size:.92em}
input,select,textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:1em;box-sizing:border-box;background:#fff}
button{margin-top:18px;width:100%;padding:13px;border:0;border-radius:10px;background:#2c3e50;color:#fff;font-size:1.05em;cursor:pointer}
button:disabled{opacity:.5} #out{white-space:pre-wrap;background:#fff;border:1px solid #eee;border-radius:10px;padding:16px;margin-top:20px;min-height:40px;line-height:1.65}
.langbtn{float:right;background:none;border:1px solid #ccc;border-radius:6px;width:auto;padding:4px 10px;margin:0;color:#555;font-size:.85em}
.fb{margin-top:10px;text-align:center;color:#999} .fb span{cursor:pointer;font-size:1.4em;margin:0 6px}
</style></head><body>
<button class="langbtn" onclick="toggleLang()">中/EN</button>
<h1>AppealPro <small style="color:#999">申诉专家</small></h1>
<div class="tag" id="tag">Professional marketplace appeal letters in 60 seconds</div>
<label>platform</label><select id="platform"><option>Amazon</option><option>eBay</option><option>Etsy</option><option>Walmart</option><option>Shopify</option></select>
<label>issue</label><select id="issue"><option>Account suspension 封号</option><option>IP complaint 侵权投诉</option><option>Negative review 恶意差评</option><option>A-to-Z claim 索赔</option><option>Listing removal 下架</option></select>
<label>Paste the notice / describe your case 粘贴平台通知或描述情况</label><textarea id="details" rows="7"></textarea>
<button id="go" onclick="ask()">Generate · 生成</button>
<div id="out"></div>
<div class="fb">Helpful? <span onclick="fb(1)">👍</span><span onclick="fb(-1)">👎</span></div>
<script>
let lang = navigator.language.startsWith("zh") ? "Chinese" : "English";
function toggleLang() { lang = lang === "Chinese" ? "English" : "Chinese";
  document.getElementById("tag").textContent = lang === "Chinese" ? "60秒生成专业电商平台申诉信" : "Professional marketplace appeal letters in 60 seconds"; }
if (lang === "Chinese") document.getElementById("tag").textContent = "60秒生成专业电商平台申诉信";
async function ask() {
  const btn = document.getElementById("go"), out = document.getElementById("out");
  btn.disabled = true; out.textContent = "…";
  try {
    const resp = await fetch(window.APP_API + "/appealpro/ask_stream", {method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({payload: {platform: document.getElementById("platform").value,issue: document.getElementById("issue").value,details: document.getElementById("details").value}, lang: lang})});
    out.textContent = "";
    const rd = resp.body.getReader(), dec = new TextDecoder(); let buf = "";
    while (true) {
      const {done, value} = await rd.read(); if (done) break;
      buf += dec.decode(value, {stream: true});
      let i; while ((i = buf.indexOf("\n\n")) >= 0) {
        const line = buf.slice(0, i).trim(); buf = buf.slice(i + 2);
        if (!line.startsWith("data: ")) continue;
        const d = JSON.parse(line.slice(6));
        if (d.token) out.textContent += d.token;
      }
    }
  } catch (e) { out.textContent = "Error: " + e; }
  btn.disabled = false;
}
function fb(s) { fetch(window.APP_API + "/appealpro/feedback", {method: "POST",
  headers: {"Content-Type": "application/json"}, body: JSON.stringify({score: s})}); alert("Thanks!"); }
</script><script>try{fetch(window.APP_API+"/scout/api/visit?app_=appealpro&src="+(new URLSearchParams(location.search).get("src")||"")+"&ref="+encodeURIComponent(document.referrer))}catch(e){}</script></body></html>
