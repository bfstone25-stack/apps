<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ReplyGuard В· еҘҪиҜ„з®Ўе®¶ вҖ” Review Reply Manager</title><script src="config.js"></script>
<style>
:root{--green:#1c5e43;--green2:#12452f;--mint:#f5f8f6;--paper:#fdfffe;--ink:#1e2a24;--dim:#66756d;--amber:#d99a3d;--amber2:#a8742a;--line:#dde6e0;
--sh-sm:0 1px 2px rgba(18,69,47,.06),0 1px 3px rgba(18,69,47,.05);
--sh-md:0 2px 4px rgba(18,69,47,.05),0 12px 28px -8px rgba(18,69,47,.12);
--ring:0 0 0 3px rgba(217,154,61,.22)}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei','Segoe UI',sans-serif;margin:0;color:var(--ink);-webkit-font-smoothing:antialiased;
background:var(--mint);background-image:radial-gradient(1100px 480px at 85% -8%,rgba(217,154,61,.07),transparent 60%),radial-gradient(900px 420px at -10% 8%,rgba(28,94,67,.05),transparent 55%)}
.serif{font-family:Georgia,'Times New Roman','Songti SC',serif}
/* в”Җв”Җ еҗёйЎ¶жҜӣзҺ»з’ғж Ҹ в”Җв”Җ */
.bar{position:sticky;top:0;z-index:40;background:rgba(18,69,47,.9);backdrop-filter:blur(14px) saturate(1.4);-webkit-backdrop-filter:blur(14px) saturate(1.4);
color:#e6efe9;padding:13px 24px;display:flex;align-items:baseline;gap:12px;border-bottom:1px solid rgba(217,154,61,.3)}
.bar .wm{font-family:Georgia,serif;font-size:1.2em;letter-spacing:2.5px;font-weight:700}
.bar .wm i{color:var(--amber);font-style:normal}
.bar .cn{font-size:.82em;color:#9fbaab;letter-spacing:4px}
.bar .langbtn{margin-left:auto;background:rgba(255,255,255,.06);border:1px solid rgba(190,214,199,.3);border-radius:999px;padding:5px 15px;color:#cfe0d5;font-size:.8em;cursor:pointer;transition:all .18s ease}
.bar .langbtn:hover{border-color:var(--amber);color:#fff;background:rgba(217,154,61,.18)}
/* в”Җв”Җ дё»дҪ“ в”Җв”Җ */
.wrap{max-width:720px;margin:0 auto;padding:34px 22px 72px;position:relative}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.wrap>*{animation:fadeUp .55s cubic-bezier(.2,.7,.3,1) both}
.wrap>*:nth-child(4){animation-delay:.06s}.wrap>*:nth-child(5){animation-delay:.12s}
.wrap>*:nth-child(6){animation-delay:.18s}.wrap>*:nth-child(7){animation-delay:.22s}
/* в”Җв”Җ еҺӢзј©hero: дёҖиЎҢж Үйўҳ+дёҖеҸҘеүҜйўҳ в”Җв”Җ */
.hero{margin:0 0 22px}
h1{font-family:Georgia,'Songti SC',serif;font-size:clamp(1.35em,3.4vw,1.8em);line-height:1.25;letter-spacing:-.3px;margin:0 0 6px;color:var(--green2)}
.sub{color:var(--dim);font-size:.95em;line-height:1.6;margin:0;max-width:620px}
/* в”Җв”Җ еә—й“әдҝЎжҒҜиЎҢ(иҜ„д»·еҚЎдёҠж–№) в”Җв”Җ */
.bizrow{display:flex;align-items:center;gap:10px;margin:0 0 12px;flex-wrap:wrap}
.bizrow .tag{font-size:.8em;font-weight:700;color:var(--green2);letter-spacing:.5px;white-space:nowrap}
.bizrow input{flex:1;min-width:220px;padding:9px 13px;border:1.5px solid var(--line);border-radius:999px;font-size:.9em;background:#fff;color:var(--ink);font-family:inherit;transition:border-color .18s ease,box-shadow .18s ease;appearance:none}
.bizrow input:focus{outline:none;border-color:var(--amber);box-shadow:var(--ring)}
/* в”Җв”Җ иҜ„д»·еҚЎ(еғҸGoogle/Yelpзҡ„дёҖжқЎиҜ„д»·) в”Җв”Җ */
.rev-card{background:rgba(253,255,254,.95);border:1px solid var(--line);border-radius:16px;padding:20px 22px 16px;box-shadow:var(--sh-md)}
.rev-head{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.avatar{width:44px;height:44px;border-radius:50%;background:#e6ece8;display:flex;align-items:center;justify-content:center;flex:none}
.avatar svg{width:26px;height:26px;color:#9aa8a0}
.rev-who{line-height:1.3}
.rev-who .nm{font-weight:700;font-size:.95em;color:var(--ink)}
.rev-who .dt{font-size:.78em;color:var(--dim)}
/* еҸҜзӮ№дә”жҳҹ */
.stars{display:flex;gap:4px;margin:2px 0 8px;padding:0;border:0;background:none}
.stars button{background:none;border:0;padding:2px;cursor:pointer;line-height:0}
.stars svg{width:26px;height:26px;transition:transform .12s ease}
.stars button:hover svg{transform:scale(1.15)}
.stars .fillst{fill:var(--amber);stroke:var(--amber)}
.stars .emptyst{fill:none;stroke:#c3cfc8;stroke-width:1.6}
.stars button:focus-visible{outline:2px solid var(--amber);border-radius:6px}
.rev-card textarea{width:100%;border:0;padding:6px 2px 2px;font-size:1em;line-height:1.65;background:transparent;color:var(--ink);font-family:inherit;resize:vertical;min-height:120px}
.rev-card textarea:focus{outline:none}
button.go{margin-top:10px;width:100%;padding:14px;border:0;border-radius:12px;background:linear-gradient(180deg,#20684b,var(--green2));color:#eef6ee;font-size:1.02em;letter-spacing:1.5px;cursor:pointer;font-weight:700;box-shadow:0 2px 6px rgba(18,69,47,.3),inset 0 1px 0 rgba(255,255,255,.08);transition:all .18s ease}
button.go:hover{transform:translateY(-1.5px);box-shadow:0 6px 18px rgba(18,69,47,.32),0 2px 8px rgba(217,154,61,.28),inset 0 1px 0 rgba(255,255,255,.1)}
button.go:active{transform:translateY(0) scale(.995)}
button.go:disabled{opacity:.55;cursor:wait;transform:none}
/* в”Җв”Җ еӣһеӨҚж°”жіЎ(е•Ҷе®¶еӣһеӨҚ,еҸіеҜ№йҪҗ) в”Җв”Җ */
.report{display:none;margin:22px 0 0 auto;max-width:88%;position:relative}
.report.on{display:block;animation:fadeUp .45s ease both}
.bubble{background:linear-gradient(135deg,#eaf3ee 0%,#e0ede6 100%);border:1px solid #cfe0d5;border-radius:18px 18px 4px 18px;padding:14px 18px 16px;box-shadow:var(--sh-sm);position:relative}
.bubble::after{content:"";position:absolute;right:-7px;bottom:6px;width:14px;height:14px;background:#e0ede6;border-right:1px solid #cfe0d5;border-bottom:1px solid #cfe0d5;transform:skewX(-30deg) rotate(45deg);border-radius:0 0 4px 0}
.bhead{display:flex;align-items:center;gap:7px;font-size:.78em;font-weight:700;color:var(--green2);letter-spacing:.8px;margin-bottom:6px}
.bhead svg{width:14px;height:14px;stroke:var(--green);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.bhead .amber{color:var(--amber2);margin-left:auto;font-family:Georgia,serif;letter-spacing:2px}
#out{white-space:pre-wrap;line-height:1.75;font-size:.96em;min-height:40px;color:var(--ink)}
.cursor::after{content:"в–Ӣ";color:var(--amber);animation:bl 1s infinite}@keyframes bl{50%{opacity:0}}
.copybtn{margin-top:10px;background:rgba(253,255,254,.85);border:1px solid var(--line);border-radius:999px;padding:6px 16px;font-size:.8em;color:var(--green2);cursor:pointer;font-weight:600;transition:all .18s ease}
.copybtn:hover{border-color:var(--amber);box-shadow:var(--sh-sm)}
/* в”Җв”Җ еҸҚйҰҲ/йЎөи„ҡ в”Җв”Җ */
.fb{margin-top:16px;text-align:center;color:var(--dim);font-size:.9em}
.fb span{cursor:pointer;font-size:1.35em;margin:0 8px;display:inline-block;transition:transform .15s ease}
.fb span:hover{transform:scale(1.25)}
.foot{margin-top:52px;border-top:1px solid var(--line);padding-top:18px;color:#8fa198;font-size:.78em;line-height:1.75;text-align:center;max-width:640px;margin-left:auto;margin-right:auto}
/* в”Җв”Җ иғҢжҷҜж°ҙеҚ°(зӣҫзүҢ+дә”жҳҹ, еҸідёҠ, ж— еҠЁз”») в”Җв”Җ */
.shield-art{position:absolute;top:6px;right:-20px;width:230px;height:230px;opacity:.05;pointer-events:none;color:var(--green);z-index:-1;animation:none!important}
.stars-art{position:absolute;top:230px;right:10px;width:230px;height:40px;opacity:.06;pointer-events:none;color:var(--amber);z-index:-1;animation:none!important}
@media(max-width:820px){.shield-art{width:170px;right:-40px;opacity:.045}.stars-art{width:160px;right:-10px}}
</style></head><body>
<div class="bar"><span class="wm">REPLY<i>GUARD</i></span><span class="cn">еҘҪиҜ„з®Ўе®¶</span>
<button class="langbtn" onclick="toggleLang()">дёӯ / EN</button></div>
<div class="wrap">
<svg class="shield-art" viewBox="0 0 200 200" aria-hidden="true">
 <path d="M100 14 L168 40 v58 c0 46 -30 74 -68 90 C62 172 32 144 32 98 V40 Z" fill="none" stroke="currentColor" stroke-width="4"/>
 <path d="M100 30 L154 51 v46 c0 37 -24 60 -54 73 -30 -13 -54 -36 -54 -73 V51 Z" fill="none" stroke="currentColor" stroke-width="1.6"/>
 <path d="M70 100 l20 20 40 -44" fill="none" stroke="currentColor" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
<svg class="stars-art" viewBox="0 0 260 44" aria-hidden="true">
 <defs>
  <path id="st" d="M0 -18 L5.3 -5.6 18.8 -4.6 8.6 4.3 11.6 17.4 0 10.4 -11.6 17.4 -8.6 4.3 -18.8 -4.6 -5.3 -5.6 Z"/>
  <clipPath id="halfclip"><rect x="-20" y="-20" width="20" height="40"/></clipPath>
 </defs>
 <g transform="translate(24 22)"><use href="#st" fill="currentColor"/></g>
 <g transform="translate(77 22)"><use href="#st" fill="currentColor"/></g>
 <g transform="translate(130 22)"><use href="#st" fill="currentColor"/></g>
 <g transform="translate(183 22)"><use href="#st" fill="currentColor"/></g>
 <g transform="translate(236 22)"><use href="#st" fill="none" stroke="currentColor" stroke-width="2"/><use href="#st" fill="currentColor" clip-path="url(#halfclip)"/></g>
</svg>
  <div class="hero"><h1 id="h1"></h1><div class="sub" id="sub"></div></div>

  <!-- еә—й“әдҝЎжҒҜ: иҜ„д»·еҚЎдёҠж–№дёҖиЎҢ -->
  <div class="bizrow"><span class="tag" id="lb1"></span><input id="business" type="text"></div>

  <!-- иҜ„д»·еҚЎ: еғҸдёҖжқЎзңҹе®һзҡ„Google/YelpиҜ„д»· -->
  <div class="rev-card">
    <div class="rev-head">
      <span class="avatar" aria-hidden="true"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-6.5 8-6.5s8 2.5 8 6.5v1H4z"/></svg></span>
      <div class="rev-who"><div class="nm" id="revnm"></div><div class="dt" id="revdt"></div></div>
    </div>
    <div class="stars" id="stars" role="radiogroup"></div>
    <!-- йҡҗи—Ҹзҡ„еҺҹrating select: зӮ№жҳҹеҗҢжӯҘе…¶value, еҗҺз«ҜpayloadдёҚеҸҳ -->
    <select id="rating" hidden aria-hidden="true"><option>5</option><option>4</option><option>3</option><option>2</option><option>1</option></select>
    <textarea id="review" rows="6"></textarea>
    <button id="go" class="go" onclick="ask()"></button>
  </div>

  <!-- е•Ҷе®¶еӣһеӨҚ: еҸіеҜ№йҪҗз»ҝиүІж°”жіЎ -->
  <div class="report" id="report">
    <div class="bubble">
      <div class="bhead">
        <svg viewBox="0 0 24 24"><path d="M12 2l8 3v6c0 5.2-3.4 8.6-8 11-4.6-2.4-8-5.8-8-11V5z"/><path d="M8.5 12l2.4 2.4 4.6-5"/></svg>
        <span id="rt"></span><span class="amber serif">RG</span>
      </div>
      <div id="out"></div>
      <button class="copybtn" id="copybtn" onclick="copyReply()"></button>
    </div>
  </div>
  <div class="fb" id="fbrow" style="display:none"><span id="fbq"></span> <span onclick="fb(1)">рҹ‘Қ</span><span onclick="fb(-1)">рҹ‘Һ</span></div>

  <div class="foot" id="foot"></div>
</div>
<script>
let lang = navigator.language.startsWith("zh") ? "Chinese" : "English";
const I18N = {
 Chinese: {
  h1:"жҜҸжқЎе·®иҜ„пјҢйғҪжҳҜдёҖж¬Ўе…¬ејҖзҡ„жңҚеҠЎеұ•зӨәгҖӮ",
  sub:"жҠҠиҜ„д»·иҙҙиҝӣдёӢйқўиҝҷеј еҚЎпјҢ30 з§’з”ҹжҲҗй«ҳжғ…е•ҶеӣһеӨҚвҖ”вҖ”йЎәеёҰжҠҠжң¬ең°жҗңзҙўе…ій”®иҜҚпјҲlocal SEOпјүиҮӘз„¶еҶҷиҝӣеҺ»гҖӮ",
  lb1:"дҪ зҡ„еә—й“әпјҲеә—еҗҚ + еҹҺеёӮпјү",
  bizph:"дҫӢпјҡSunny Dental, Plano TX",
  revnm:"йЎҫе®ў Customer", revdt:"еҲҡеҲҡ В· жқҘиҮӘиҜ„д»·е№іеҸ°",
  starlab:"жү“дәҶеҮ йў—жҳҹ",
  go:"з”ҹжҲҗе•Ҷе®¶еӣһеӨҚ", rt:"е•Ҷе®¶еӣһеӨҚ В· OWNER RESPONSE", fbq:"иҝҷжқЎеӣһеӨҚеё®еҲ°дҪ дәҶеҗ—пјҹ",
  ph:"жҠҠйЎҫе®ўзҡ„иҜ„д»·еҺҹж–ҮиҙҙиҝӣжқҘвҖҰпјҲд»…з”ЁдәҺжң¬ж¬Ўз”ҹжҲҗпјҢдёҚдјҡдҝқеӯҳпјү",
  copy:"еӨҚеҲ¶еӣһеӨҚ", copied:"е·ІеӨҚеҲ¶ вң“",
  foot:"ReplyGuard з”ҹжҲҗеӣһеӨҚе»әи®®пјҢеҸ‘еёғеүҚиҜ·зЎ®и®Өз¬ҰеҗҲе№іеҸ°и§„иҢғдёҺдәӢе®һгҖӮиҜ„д»·еҶ…е®№д»…еңЁжң¬ж¬ЎдјҡиҜқдёӯеӨ„зҗҶпјҢжңҚеҠЎеҷЁдёҚз•ҷеӯҳгҖӮ"
 },
 English: {
  h1:"Every bad review is a public stage for your service.",
  sub:"Paste the review into the card below вҖ” a high-EQ, local-SEO-friendly owner response in 30 seconds.",
  lb1:"Your business (name + city)",
  bizph:"e.g. Sunny Dental, Plano TX",
  revnm:"Customer", revdt:"Just now В· from a review platform",
  starlab:"stars given",
  go:"Generate Owner Response", rt:"OWNER RESPONSE", fbq:"Did this reply help?",
  ph:"Paste the customer's review hereвҖҰ (used for this reply only, never stored)",
  copy:"Copy reply", copied:"Copied вң“",
  foot:"ReplyGuard generates reply suggestions. Please confirm they match platform guidelines and the facts before posting. Reviews are processed for this session only and never stored."
 }
};
/* в”Җв”Җ еҸҜзӮ№дә”жҳҹ: дёҺйҡҗи—Ҹselect#ratingеҸҢеҗ‘еҗҢжӯҘ(valueеӯ—з¬ҰдёІ"1".."5",дёҺеҺҹselectдёҖиҮҙ) в”Җв”Җ */
const STAR="M12 2.6l2.9 5.9 6.5.95-4.7 4.6 1.1 6.5L12 17.5l-5.8 3.05 1.1-6.5-4.7-4.6 6.5-.95z";
function drawStars(){
  const cur=parseInt(document.getElementById("rating").value,10);
  const t=I18N[lang];
  document.getElementById("stars").innerHTML=[1,2,3,4,5].map(n=>
    `<button type="button" role="radio" aria-checked="${n===cur}" aria-label="${n} ${t.starlab}"
       onclick="setStars(${n})" onmouseenter="previewStars(${n})" onmouseleave="previewStars(0)">
       <svg viewBox="0 0 24 24" class="${n<=cur?'fillst':'emptyst'}"><path d="${STAR}" stroke-linejoin="round"/></svg></button>`).join("");
}
function setStars(n){ document.getElementById("rating").value=String(n); drawStars(); }
function previewStars(n){
  const cur=n||parseInt(document.getElementById("rating").value,10);
  document.querySelectorAll("#stars svg").forEach((s,i)=>{s.setAttribute("class",i<cur?"fillst":"emptyst");});
}
function render(){
  const t=I18N[lang];
  h1.textContent=t.h1; sub.textContent=t.sub;
  lb1.textContent=t.lb1;
  document.getElementById("business").placeholder=t.bizph;
  revnm.textContent=t.revnm; revdt.textContent=t.revdt;
  document.getElementById("go").textContent=t.go;
  rt.textContent=t.rt; fbq.textContent=t.fbq; foot.textContent=t.foot;
  document.getElementById("review").placeholder=t.ph;
  document.getElementById("copybtn").textContent=t.copy;
  drawStars();
}
function toggleLang(){ lang = lang==="Chinese"?"English":"Chinese"; render(); }
render();
async function ask(){
  const btn=document.getElementById("go"), out=document.getElementById("out");
  btn.disabled=true; document.getElementById("report").classList.add("on");
  out.classList.add("cursor"); out.textContent="";
  try{
    const resp=await fetch(window.APP_API+"/replyguard/ask_stream",{method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({payload:{business:document.getElementById("business").value,rating:document.getElementById("rating").value,review:document.getElementById("review").value},lang:lang})});
    const rd=resp.body.getReader(),dec=new TextDecoder();let buf="";
    while(true){
      const{done,value}=await rd.read();if(done)break;
      buf+=dec.decode(value,{stream:true});
      let i;while((i=buf.indexOf("\n\n"))>=0){
        const line=buf.slice(0,i).trim();buf=buf.slice(i+2);
        if(!line.startsWith("data: "))continue;
        const d=JSON.parse(line.slice(6));
        if(d.token)out.textContent+=d.token;
      }
    }
    document.getElementById("fbrow").style.display="block";
  }catch(e){out.textContent="Error: "+e;}
  out.classList.remove("cursor"); btn.disabled=false;
}
function copyReply(){
  const b=document.getElementById("copybtn"),t=I18N[lang];
  navigator.clipboard.writeText(document.getElementById("out").textContent).then(()=>{
    b.textContent=t.copied; setTimeout(()=>{b.textContent=t.copy;},1600);
  });
}
function fb(s){fetch(window.APP_API+"/replyguard/feedback",{method:"POST",
  headers:{"Content-Type":"application/json"},body:JSON.stringify({score:s})});alert(lang==="Chinese"?"е·Іж”¶еҲ°пјҢи°ўи°ўпјҒ":"Thanks!");}
</script><script>try{fetch(window.APP_API+"/scout/api/visit?app_=replyguard&src="+(new URLSearchParams(location.search).get("src")||"")+"&ref="+encodeURIComponent(document.referrer))}catch(e){}</script></body></html>
