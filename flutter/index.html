<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>怦然 · Flutter</title><script src="config.js"></script>
<style>
:root{--accent:#e87aa8;--hue:320}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;overflow:hidden;font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;color:#3a2b33}
#app{position:fixed;inset:0;display:flex;flex-direction:column;max-width:520px;margin:0 auto;overflow:hidden}
.lang{position:absolute;top:12px;right:12px;z-index:30;background:rgba(255,255,255,.55);border:0;border-radius:20px;padding:5px 12px;font-size:.8em;cursor:pointer;backdrop-filter:blur(6px)}

/* ---------- 选人画面 ---------- */
#select{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;
  background:linear-gradient(160deg,#ffe3ec,#fff1e6 45%,#e7f0ff)}
#select h1{font-size:2em;margin:0 0 2px;letter-spacing:4px;color:#c9527e;text-shadow:0 2px 12px rgba(232,122,168,.3)}
#select .sub{color:#9a7b86;margin-bottom:10px;font-size:.9em}
.card{width:100%;max-width:380px;border-radius:22px;padding:18px 20px;cursor:pointer;display:flex;align-items:center;gap:16px;
  border:1px solid rgba(255,255,255,.7);box-shadow:0 10px 30px rgba(180,120,150,.18);transition:transform .18s,box-shadow .18s;position:relative;overflow:hidden}
.card:active{transform:scale(.97)}
.card .por{width:66px;height:66px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2em;flex:0 0 auto;
  box-shadow:inset 0 0 0 3px rgba(255,255,255,.6),0 4px 14px rgba(0,0,0,.12)}
.card .nm{font-size:1.25em;font-weight:800;letter-spacing:1px}
.card .ti{font-size:.82em;opacity:.72;margin-top:2px}
.card .tg{font-size:.72em;margin-top:6px;display:inline-block;padding:2px 10px;border-radius:12px;background:rgba(255,255,255,.6)}

/* ---------- 游戏画面 ---------- */
#game{position:absolute;inset:0;display:none;flex-direction:column}
#scene{position:absolute;inset:0;z-index:0;transition:background .8s}
.glow{position:absolute;border-radius:50%;filter:blur(50px);opacity:.5;animation:breathe 7s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.25)}}
.particles{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:1}
.petal{position:absolute;top:-30px;font-size:16px;opacity:.8;animation:fall linear infinite}
@keyframes fall{to{transform:translateY(115vh) rotate(360deg)}}

/* 顶部HUD */
.hud{position:relative;z-index:5;padding:14px 16px 6px;display:flex;align-items:center;gap:10px}
.aff{flex:1}
.aff .lab{font-size:.7em;color:#7a5a66;display:flex;justify-content:space-between;margin-bottom:3px}
.bar{height:12px;border-radius:8px;background:rgba(255,255,255,.5);overflow:hidden;box-shadow:inset 0 1px 3px rgba(0,0,0,.12)}
.fill{height:100%;width:0;border-radius:8px;background:linear-gradient(90deg,#ff9ec4,var(--accent));transition:width .6s cubic-bezier(.22,1,.36,1)}
.mood{font-size:1.5em;filter:drop-shadow(0 2px 4px rgba(0,0,0,.15))}

/* 立绘 */
.stage{position:relative;z-index:4;flex:1;display:flex;align-items:center;justify-content:center;min-height:0}
.portrait{width:210px;height:290px;border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:4.6em;
  background-color:rgba(255,255,255,.25);background-size:cover;background-position:top center;
  box-shadow:0 0 0 4px rgba(255,255,255,.4),0 0 44px 6px var(--accent),0 16px 44px rgba(0,0,0,.28);
  animation:bob 4.5s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.pet{position:absolute;bottom:6px;left:14px;z-index:4;font-size:2em;animation:bob 3.4s ease-in-out infinite}

/* 对话框 VN */
.dbox{position:relative;z-index:6;margin:0 12px 10px;padding:16px 18px 14px;border-radius:20px;min-height:120px;
  background:rgba(255,255,255,.82);backdrop-filter:blur(10px);box-shadow:0 -4px 24px rgba(150,90,120,.18)}
.name{position:absolute;top:-14px;left:18px;background:var(--accent);color:#fff;font-weight:800;font-size:.9em;padding:4px 16px;border-radius:14px;box-shadow:0 3px 10px rgba(0,0,0,.15)}
.line{font-size:1.08em;line-height:1.6;min-height:52px;color:#3a2b33}
.cursor{display:inline-block;width:7px;background:var(--accent);margin-left:1px;animation:blink .7s steps(1) infinite}
@keyframes blink{50%{opacity:0}}
.inrow{display:flex;gap:8px;margin-top:12px}
#inp{flex:1;background:#fff;border:1.5px solid #f2d3de;border-radius:22px;padding:11px 16px;font-size:1em;font-family:inherit;outline:none}
#inp:focus{border-color:var(--accent)}
#send{background:var(--accent);border:0;border-radius:22px;padding:0 18px;color:#fff;font-size:1.1em;cursor:pointer;transition:transform .12s}
#send:active{transform:scale(.9)}#send:disabled{opacity:.45}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.chip{font-size:.78em;padding:5px 11px;border-radius:14px;background:rgba(255,255,255,.7);border:1px solid #f2d3de;cursor:pointer;color:#a85f7e}

/* 里程碑弹幕 */
.ms{position:absolute;inset:0;z-index:15;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(255,225,235,.55);backdrop-filter:blur(3px)}
.ms .big{font-size:2.6em;font-weight:900;color:#c9527e;text-shadow:0 3px 16px rgba(232,122,168,.5);animation:pop .5s cubic-bezier(.2,1.4,.4,1)}
@keyframes pop{from{transform:scale(.3);opacity:0}}
.burst{position:absolute;font-size:1.6em;animation:burst 1.1s ease-out forwards}
@keyframes burst{to{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}
.back{position:absolute;top:12px;left:12px;z-index:8;background:rgba(255,255,255,.55);border:0;border-radius:20px;padding:5px 12px;font-size:.8em;cursor:pointer}
</style></head><body>
<div id="app">
<button class="lang" onclick="toggleLang()">中/EN</button>

<div id="select">
  <h1>怦然</h1><div class="sub" id="ssub">Flutter · 他，真的会记得你</div>
  <div id="cards"></div>
</div>

<div id="game">
  <div id="scene"></div>
  <div class="particles" id="particles"></div>
  <button class="back" onclick="goSelect()">‹</button>
  <div class="hud">
    <div class="aff"><div class="lab"><span id="afflab">好感</span><span id="affpct">0%</span></div>
      <div class="bar"><div class="fill" id="fill"></div></div></div>
    <div class="mood" id="mood">🌸</div>
  </div>
  <div class="stage"><div class="portrait" id="portrait">💗</div><div class="pet" id="pet">🐱</div></div>
  <div class="dbox">
    <div class="name" id="cname">…</div>
    <div class="line" id="line"></div>
    <div class="inrow"><input id="inp" placeholder="说点什么…" enterkeyhint="send"><button id="send" onclick="say()">♡</button></div>
    <div class="chips" id="chips"></div>
  </div>
  <div class="ms" id="ms"><div class="big" id="msbig"></div></div>
</div>
</div>
<script>
const API = window.FLUTTER_API || window.APP_API || "";
let lang = navigator.language.startsWith("zh") ? "zh" : "en";
let R=null, route=null, hist=[], mem="", aff=0, busy=false;
const T={zh:{sub:"他，真的会记得你",aff:"好感",ph:"说点什么…",
  chips:["今天想你了","给你带了咖啡","陪我说说话","你今天好看"],
  ms:{初识:"初识",心动:"心动",交心:"交心",怦然:"怦然♡"}},
 en:{sub:"He truly remembers you",aff:"Affection",ph:"Say something…",
  chips:["I missed you","Brought you coffee","Talk with me","You look lovely today"]}};
function tr(){return T[lang]}

async function boot(){
 R=await (await fetch(API+"/routes?lang="+lang)).json();
 document.getElementById("ssub").textContent="Flutter · "+tr().sub;
 document.getElementById("cards").innerHTML=R.routes.map(r=>{
   const g=`hsl(${r.hue},70%,92%)`,g2=`hsl(${r.hue},75%,84%)`;
   return `<div class="card" style="background:linear-gradient(135deg,${g},${g2})" onclick="startRoute('${r.id}')">
     <div class="por" style="background-image:url('portraits/${r.id}.jpg');background-size:cover;background-position:top center"></div>
     <div><div class="nm" style="color:${r.accent}">${r.name}</div>
       <div class="ti">${r.title}</div><div class="tg">${r.tag}</div></div></div>`;}).join("");
}
function petals(hue){
 const p=document.getElementById("particles");p.innerHTML="";
 const set=["🌸","💗","✨","🌸","💮"];
 for(let i=0;i<14;i++){const e=document.createElement("div");e.className="petal";
   e.textContent=set[i%set.length];e.style.left=Math.random()*100+"%";
   e.style.animationDuration=(6+Math.random()*7)+"s";e.style.animationDelay=(-Math.random()*10)+"s";
   e.style.fontSize=(11+Math.random()*12)+"px";p.appendChild(e);}
}
function startRoute(id){
 route=R.routes.find(r=>r.id===id);
 document.documentElement.style.setProperty("--accent",route.accent);
 document.documentElement.style.setProperty("--hue",route.hue);
 const sv=localStorage.getItem("flutter_"+id);
 if(sv){const d=JSON.parse(sv);hist=d.hist||[];mem=d.mem||"";aff=d.aff||0;}else{hist=[];mem="";aff=0;}
 // scene bg
 const sc=document.getElementById("scene");
 sc.style.background=`linear-gradient(165deg,hsl(${route.hue},65%,88%),hsl(${(route.hue+30)%360},60%,90%) 55%,hsl(${(route.hue+330)%360},55%,86%))`;
 sc.innerHTML=`<div class="glow" style="width:60%;height:30%;top:8%;left:-10%;background:${route.accent}"></div>
   <div class="glow" style="width:50%;height:28%;bottom:12%;right:-8%;background:hsl(${route.hue},80%,75%);animation-delay:-3s"></div>`;
 petals(route.hue);
 {const _p=document.getElementById("portrait");_p.textContent="";updatePortrait();}
 document.getElementById("pet").textContent=R.pet.emoji;
 document.getElementById("cname").textContent=route.name;
 document.getElementById("afflab").textContent=tr().aff;
 document.getElementById("inp").placeholder=tr().ph;
 renderChips(); updateAff(false);
 document.getElementById("select").style.display="none";
 document.getElementById("game").style.display="flex";
 // 重逢台词 or 初见
 if(hist.length){const last=hist.filter(m=>m.role==="assistant").pop();
   typeLine(last?last.content:greeting());}
 else typeLine(greeting());
}
function greeting(){
 const g={guyan:{zh:"（抬头，轻轻一笑）你来了。今天想读点什么？",en:"(looks up, a soft smile) You're here. What shall we read today?"},
  luxingye:{zh:"（摘下口罩，眼睛亮起来）就知道你会来。想我了没？",en:"(pulls down his mask, eyes lighting up) I knew you'd come. Did you miss me?"},
  fushen:{zh:"（转过身，语气淡淡却放柔了）……来了。坐吧。",en:"(turns, voice cool but softening) ...You're here. Sit."}};
 return (g[route.id]||{})[lang]||"…";
}
function renderChips(){
 document.getElementById("chips").innerHTML=(tr().chips||T.en.chips).map(c=>
   `<span class="chip" onclick="quick('${c}')">${c}</span>`).join("");
}
function quick(c){document.getElementById("inp").value=c;say();}
let typing=null;
function typeLine(txt){
 clearInterval(typing);const el=document.getElementById("line");el.innerHTML="";
 let i=0;const cur='<span class="cursor">&nbsp;</span>';el.innerHTML=cur;
 typing=setInterval(()=>{i++;el.innerHTML=txt.slice(0,i).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]))+(i<txt.length?cur:"");
   if(i>=txt.length)clearInterval(typing);},26);
}
function exprFor(a){return a>=15?'_love':a>=8?'_blush':a>=3?'_smile':'';}
let lastExpr=null;
function updatePortrait(){const p=document.getElementById('portrait');
 const e=exprFor(aff);
 if(lastExpr!==null&&e!==lastExpr){p.style.transition='box-shadow .35s';p.style.boxShadow='0 0 0 6px rgba(255,255,255,.55),0 0 70px 14px var(--accent),0 16px 44px rgba(0,0,0,.28)';setTimeout(()=>{p.style.boxShadow='';},700);}
 lastExpr=e;
 p.style.backgroundImage="url('portraits/"+route.id+e+".jpg')";}
function updateAff(anim){ if(route) updatePortrait();
 document.getElementById("fill").style.width=aff+"%";
 document.getElementById("affpct").textContent=aff+"%";
}
function save(){localStorage.setItem("flutter_"+route.id,JSON.stringify({hist:hist.slice(-24),mem:mem,aff:aff}));}
async function say(){
 if(busy)return;const inp=document.getElementById("inp"),msg=inp.value.trim();if(!msg)return;
 inp.value="";busy=true;document.getElementById("send").disabled=true;
 typeLine(lang==="zh"?"（……）":"(…)");
 hist.push({role:"user",content:msg});
 try{
  const r=await (await fetch(API+"/say",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({route:route.id,history:hist.slice(0,-1),memory:mem,message:msg,affection:aff,lang:lang,pid:pid()})})).json();
  hist.push({role:"assistant",content:r.reply});
  if(r.memory_update)mem=(mem?mem+" ":"")+r.memory_update;
  const prev=aff;aff=r.affection;
  document.getElementById("mood").textContent=r.mood||"💗";
  updateAff(true);typeLine(r.reply);
  if(aff>prev)floatHeart();
  if(r.milestone)celebrate(r.milestone);
  save();
 }catch(e){typeLine(lang==="zh"?"（信号断了…再说一次？）":"(connection lost… try again?)");}
 busy=false;document.getElementById("send").disabled=false;
}
function floatHeart(){const b=document.getElementById("portrait").getBoundingClientRect();
 const h=document.createElement("div");h.textContent="♡";h.style.cssText=`position:fixed;left:${b.left+b.width/2}px;top:${b.top}px;z-index:16;font-size:1.6em;color:var(--accent);pointer-events:none;transition:all 1.1s ease-out;opacity:1`;
 document.body.appendChild(h);requestAnimationFrame(()=>{h.style.top=(b.top-90)+"px";h.style.opacity="0";});setTimeout(()=>h.remove(),1100);}
function celebrate(txt){
 const ms=document.getElementById("ms"),big=document.getElementById("msbig");
 big.textContent=(tr().ms&&tr().ms[txt])||txt;ms.style.display="flex";
 for(let i=0;i<18;i++){const b=document.createElement("div");b.className="burst";b.textContent=["💗","🌸","✨","💖"][i%4];
   b.style.left="50%";b.style.top="50%";b.style.setProperty("--dx",(Math.random()*300-150)+"px");
   b.style.setProperty("--dy",(Math.random()*300-150)+"px");ms.appendChild(b);setTimeout(()=>b.remove(),1100);}
 setTimeout(()=>{ms.style.display="none";},1700);
}
function goSelect(){document.getElementById("game").style.display="none";document.getElementById("select").style.display="flex";}
function pid(){let p=localStorage.getItem("flutter_pid");if(!p){p=Math.random().toString(36).slice(2)+Date.now().toString(36);localStorage.setItem("flutter_pid",p);}return p;}
function toggleLang(){lang=lang==="zh"?"en":"zh";if(route){renderChips();document.getElementById("afflab").textContent=tr().aff;document.getElementById("inp").placeholder=tr().ph;}else boot();}
document.getElementById("inp").addEventListener("keydown",e=>{if(e.key==="Enter")say();});
boot();
</script></body></html>
