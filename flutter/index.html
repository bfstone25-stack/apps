<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,interactive-widget=resizes-content">
<title>怦然 · Flutter</title><script src="config.js"></script>
<style>
:root{--accent:#e87aa8;--hue:320}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;overflow:hidden;font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;color:#3a2b33}
#app{position:fixed;inset:0;display:flex;flex-direction:column;max-width:520px;margin:0 auto;overflow:hidden}
.lang{position:absolute;top:12px;right:12px;z-index:30;background:rgba(255,255,255,.55);border:0;border-radius:20px;padding:5px 12px;min-height:44px;min-width:44px;font-size:.8em;cursor:pointer;backdrop-filter:blur(6px)}

/* ---------- 选人画面 ---------- */
#select{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;
  background:linear-gradient(160deg,#ffe3ec,#fff1e6 45%,#e7f0ff)}
#select h1{font-size:2em;margin:0 0 2px;letter-spacing:4px;color:#c9527e;text-shadow:0 2px 12px rgba(232,122,168,.3)}
#select .sub{color:#9a7b86;margin-bottom:10px;font-size:.9em}
.card{width:100%;max-width:380px;border-radius:22px;padding:18px 20px;cursor:pointer;display:flex;align-items:center;gap:16px;
  border:1px solid rgba(255,255,255,.7);box-shadow:0 10px 30px rgba(180,120,150,.18);transition:transform .18s,box-shadow .18s;position:relative;overflow:hidden}
.card:active{transform:scale(.97)}
.card .por{width:66px;height:66px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2em;flex:0 0 auto;
  box-shadow:inset 0 0 0 3px rgba(255,255,255,.6),0 4px 14px rgba(0,0,0,.12)}
.card .nm{font-size:1.25em;font-weight:800;letter-spacing:1px}
.card .ti{font-size:.82em;opacity:.72;margin-top:2px}
.card .tg{font-size:.72em;margin-top:6px;display:inline-block;padding:2px 10px;border-radius:12px;background:rgba(255,255,255,.6)}

/* ---------- 游戏画面 ---------- */
#game{position:absolute;inset:0;display:none;flex-direction:column}
#scene{position:absolute;inset:0;z-index:0;transition:background .8s}
.glow{position:absolute;border-radius:50%;filter:blur(50px);opacity:.5;animation:breathe 7s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.25)}}
.particles{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:1}
.petal{position:absolute;top:-30px;font-size:16px;opacity:.8;animation:fall linear infinite}
@keyframes fall{to{transform:translateY(115vh) rotate(360deg)}}

/* 顶部HUD */
.hud{position:relative;z-index:5;padding:14px 16px 6px;display:flex;align-items:center;gap:10px}
.aff{flex:1}
.aff .lab{font-size:.7em;color:#7a5a66;display:flex;justify-content:space-between;margin-bottom:3px}
.bar{height:12px;border-radius:8px;background:rgba(255,255,255,.5);overflow:hidden;box-shadow:inset 0 1px 3px rgba(0,0,0,.12)}
.fill{height:100%;width:0;border-radius:8px;background:linear-gradient(90deg,#ff9ec4,var(--accent));transition:width .6s cubic-bezier(.22,1,.36,1)}
.mood{font-size:1.5em;filter:drop-shadow(0 2px 4px rgba(0,0,0,.15))}

/* 立绘 */
.stage{position:relative;z-index:4;flex:1;display:flex;align-items:center;justify-content:center;min-height:0}
.portrait{width:210px;height:290px;border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:4.6em;
  background-color:rgba(255,255,255,.25);background-size:cover;background-position:top center;
  box-shadow:0 0 0 4px rgba(255,255,255,.4),0 0 44px 6px var(--accent),0 16px 44px rgba(0,0,0,.28);
  animation:bob 4.5s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.pet{position:absolute;bottom:6px;left:14px;z-index:4;font-size:2em;animation:bob 3.4s ease-in-out infinite}

/* 对话框 VN */
.dbox{position:relative;z-index:6;margin:0 12px 10px;padding:16px 18px 14px;border-radius:20px;min-height:120px;
  background:rgba(255,255,255,.82);backdrop-filter:blur(10px);box-shadow:0 -4px 24px rgba(150,90,120,.18)}
.name{position:absolute;top:-14px;left:18px;background:var(--accent);color:#fff;font-weight:800;font-size:.9em;padding:4px 16px;border-radius:14px;box-shadow:0 3px 10px rgba(0,0,0,.15)}
.line{font-size:1.08em;line-height:1.6;min-height:52px;color:#3a2b33}
.cursor{display:inline-block;width:7px;background:var(--accent);margin-left:1px;animation:blink .7s steps(1) infinite}
@keyframes blink{50%{opacity:0}}
.inrow{display:flex;gap:8px;margin-top:12px}
#inp{flex:1;min-width:0;min-height:44px;background:#fff;border:1.5px solid #f2d3de;border-radius:22px;padding:11px 16px;font-size:1em;font-family:inherit;outline:none}
#inp:focus{border-color:var(--accent)}
#send{background:linear-gradient(135deg,#f4cfa6,var(--accent) 70%);border:0;border-radius:22px;padding:0 18px;min-width:56px;min-height:44px;color:#fff;font-size:1em;font-weight:700;letter-spacing:1px;cursor:pointer;transition:transform .12s;box-shadow:0 3px 10px rgba(232,122,168,.35),inset 0 1px 0 rgba(255,255,255,.45)}
#send:active{transform:scale(.9)}#send:disabled{opacity:.45}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.chip{font-size:.78em;padding:5px 13px;min-height:38px;display:inline-flex;align-items:center;border-radius:19px;background:rgba(255,255,255,.7);border:1px solid #f2d3de;cursor:pointer;color:#a85f7e}

/* 里程碑弹幕 */
.ms{position:absolute;inset:0;z-index:15;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(255,225,235,.55);backdrop-filter:blur(3px)}
.ms .big{font-size:2.6em;font-weight:900;color:#c9527e;text-shadow:0 3px 16px rgba(232,122,168,.5);animation:pop .5s cubic-bezier(.2,1.4,.4,1)}
@keyframes pop{from{transform:scale(.3);opacity:0}}
.burst{position:absolute;font-size:1.6em;animation:burst 1.1s ease-out forwards}
@keyframes burst{to{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}
.back{position:absolute;top:12px;left:12px;z-index:8;background:rgba(255,255,255,.55);border:0;border-radius:20px;padding:5px 12px;min-height:44px;min-width:44px;font-size:1em;cursor:pointer}
.card .hk{font-size:.76em;margin-top:6px;color:#a8798d;font-style:italic;line-height:1.4}

/* ---------- 序幕 Prologue ---------- */
#prologueOv{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;padding:22px;
  background:linear-gradient(170deg,rgba(24,16,34,.9),rgba(46,22,44,.88) 55%,rgba(20,14,30,.92));backdrop-filter:blur(8px)}
#prologueOv.show{display:flex}
.plg-card{width:100%;max-width:420px;border-radius:18px;padding:34px 28px 30px;text-align:center;position:relative;
  background:linear-gradient(165deg,rgba(56,32,52,.92),rgba(38,24,44,.94));
  border:1px solid rgba(233,180,160,.28);box-shadow:0 0 60px rgba(232,122,168,.22),0 24px 60px rgba(0,0,0,.5)}
.plg-card::before{content:"";position:absolute;inset:0;border-radius:18px;pointer-events:none;
  background:radial-gradient(60% 40% at 50% 0%,rgba(240,180,190,.12),transparent 70%)}
.plg-star{font-size:1.5em;margin-bottom:14px;opacity:0;animation:plgIn 1.2s ease forwards .2s}
.plg-p{color:#f3dde2;font-size:.98em;line-height:1.85;margin:0 0 16px;opacity:0;animation:plgIn 1.2s ease forwards;letter-spacing:.4px}
.plg-p.names{color:#eec9a8;font-size:.9em;letter-spacing:1px}
.plg-p:nth-of-type(1){animation-delay:.5s}.plg-p:nth-of-type(2){animation-delay:1.6s}
.plg-p:nth-of-type(3){animation-delay:3s}.plg-p:nth-of-type(4){animation-delay:4s}
@keyframes plgIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.plg-btn{margin-top:10px;padding:12px 38px;border:0;border-radius:26px;cursor:pointer;font-size:1em;font-weight:700;letter-spacing:2px;
  color:#4a2c38;background:linear-gradient(135deg,#f4cfa6,#eda9bd 60%,#e78ab0);
  box-shadow:0 6px 22px rgba(232,122,168,.4),inset 0 1px 0 rgba(255,255,255,.5);
  opacity:0;animation:plgIn 1.2s ease forwards 4.9s;transition:transform .15s}
.plg-btn:active{transform:scale(.95)}
.plg-card.fast .plg-star,.plg-card.fast .plg-p,.plg-card.fast .plg-btn{animation-delay:0s;animation-duration:.4s}
.help{position:absolute;top:12px;right:88px;z-index:30;width:44px;height:44px;background:rgba(255,255,255,.55);border:0;border-radius:50%;font-size:.85em;cursor:pointer;backdrop-filter:blur(6px);color:#a85f7e;font-weight:800}

/* ---------- 反馈 Feedback ---------- */
.fbbtn{position:absolute;top:12px;right:138px;z-index:30;width:44px;height:44px;background:rgba(255,255,255,.55);border:0;border-radius:50%;font-size:1.05em;cursor:pointer;backdrop-filter:blur(6px);color:#c9527e}
#fbOv{position:fixed;inset:0;z-index:70;display:none;align-items:center;justify-content:center;padding:22px;background:rgba(60,35,50,.35);backdrop-filter:blur(4px)}
#fbOv.show{display:flex}
.fb-card{width:100%;max-width:340px;border-radius:20px;padding:24px 22px 20px;text-align:center;position:relative;
  background:linear-gradient(160deg,#fff4f0,#ffe8ee 60%,#fdeee4);
  border:1px solid rgba(233,180,190,.55);box-shadow:0 14px 44px rgba(180,110,140,.3)}
.fb-x{position:absolute;top:8px;right:8px;width:36px;height:36px;border:0;border-radius:50%;background:transparent;color:#b98a9c;font-size:1.1em;cursor:pointer}
.fb-q{font-weight:800;color:#b0577e;font-size:1.02em;margin-bottom:14px;letter-spacing:.5px}
.fb-emos{display:flex;justify-content:center;gap:18px;margin-bottom:14px}
.fb-emo{font-size:2em;background:rgba(255,255,255,.65);border:2px solid transparent;border-radius:50%;width:58px;height:58px;cursor:pointer;transition:transform .15s,border-color .15s}
.fb-emo:active{transform:scale(.9)}
.fb-emo.sel{border-color:#e087ac;background:#fff;box-shadow:0 4px 14px rgba(224,135,172,.35)}
.fb-note{width:100%;border:1.5px solid #f0cfda;border-radius:14px;padding:10px 12px;font-size:.9em;font-family:inherit;outline:none;background:rgba(255,255,255,.8);resize:none;color:#3a2b33}
.fb-note:focus{border-color:#e087ac}
.fb-send{margin-top:12px;padding:10px 34px;border:0;border-radius:22px;cursor:pointer;font-weight:700;letter-spacing:1px;color:#fff;
  background:linear-gradient(135deg,#eda9bd,#e087ac);box-shadow:0 5px 16px rgba(224,135,172,.4)}
.fb-send:disabled{opacity:.45}
.fb-done{color:#b0577e;font-weight:800;font-size:1.15em;padding:26px 0;animation:pop .4s cubic-bezier(.2,1.4,.4,1)}
#fbBar{position:fixed;left:50%;bottom:-90px;transform:translateX(-50%);z-index:65;width:calc(100% - 32px);max-width:420px;
  border-radius:18px;padding:10px 14px;display:flex;align-items:center;gap:10px;
  background:linear-gradient(150deg,#fff4f0,#ffe8ee);border:1px solid rgba(233,180,190,.55);
  box-shadow:0 10px 30px rgba(180,110,140,.35);transition:bottom .6s cubic-bezier(.22,1,.36,1)}
#fbBar.show{bottom:16px}
#fbBar .fb-q{margin:0;flex:1;text-align:left;font-size:.88em}
#fbBar .fb-emo{width:42px;height:42px;font-size:1.35em}
</style></head><body>
<div id="app">
<button class="lang" onclick="toggleLang()">中/EN</button>
<button class="help" onclick="showPrologue()" title="Prologue">?</button>
<button class="fbbtn" id="fbBtn" onclick="openFb()" title="Feedback" style="display:none">♡</button>

<div id="fbOv" onclick="if(event.target===this)closeFb()">
  <div class="fb-card" id="fbCard"></div>
</div>
<div id="fbBar"></div>

<div id="prologueOv">
  <div class="plg-card" id="plgCard"></div>
</div>

<div id="select">
  <h1>怦然</h1><div class="sub" id="ssub">Flutter · 他，真的会记得你</div>
  <div id="cards"></div>
</div>

<div id="game">
  <div id="scene"></div>
  <div class="particles" id="particles"></div>
  <button class="back" onclick="goSelect()">‹</button>
  <div class="hud">
    <div class="aff"><div class="lab"><span id="afflab">好感</span><span id="affpct">0%</span></div>
      <div class="bar"><div class="fill" id="fill"></div></div></div>
    <div class="mood" id="mood">🌸</div>
  </div>
  <div class="stage"><div class="portrait" id="portrait">💗</div><div class="pet" id="pet">🐱</div></div>
  <div class="dbox">
    <div class="name" id="cname">…</div>
    <div class="line" id="line"></div>
    <div class="inrow"><input id="inp" placeholder="说点什么…" enterkeyhint="send"><button id="send" onclick="say()">♡</button></div>
    <div class="chips" id="chips"></div>
  </div>
  <div class="ms" id="ms"><div class="big" id="msbig"></div></div>
</div>
</div>
<script>
const API = window.FLUTTER_API || window.APP_API || "";
let lang = navigator.language.startsWith("zh") ? "zh" : "en";
let R=null, route=null, hist=[], mem="", aff=0, busy=false;
const T={zh:{sub:"他，真的会记得你",aff:"好感",ph:"说点什么…",send:"发送 ♡",
  chips:["今天想你了","给你带了咖啡","陪我说说话","你今天好看"],
  ms:{初识:"初识",心动:"心动",交心:"交心",怦然:"怦然♡"}},
 en:{sub:"He truly remembers you",aff:"Affection",ph:"Say something…",send:"Send ♡",
  chips:["I missed you","Brought you coffee","Talk with me","You look lovely today"]}};
function tr(){return T[lang]}

/* ---------- 序幕 Prologue ---------- */
const PLG={zh:{p:["加班到十一点，地铁上人很少。",
  "你刷着手机，突然想：要是有个人，能记得我随口说过的每一句话——记得我讨厌香菜，记得我上周说想去看海，记得我今天说了“好累”。",
  "在这里，有三个人会这样记得你。",
  "冷静自持的医生顾言 · 炽热直接的机车手陆行野 · 温柔缜密的律师傅深"],btn:"遇见他们"},
 en:{p:["Eleven p.m. Overtime again. The train is almost empty.",
  "You scroll your phone and wonder—what if someone remembered every little thing you ever said? That you hate cilantro. That last week you wanted to see the ocean. That today you said 'I'm so tired.'",
  "Here, three people will remember you exactly like that.",
  "Gu Yan, the composed doctor · Lu Xingye, the ardent rider · Fu Shen, the gentle lawyer"],btn:"Meet Them"}};
const HOOKS={guyan:{zh:"他不多话，但你说过的他都记得。",en:"He doesn't say much—but he remembers everything you say."},
 luxingye:{zh:"他的世界很吵，唯独听你的时候很安静。",en:"His world is loud, yet he goes quiet just to listen to you."},
 fushen:{zh:"他能赢所有辩论，却总让着你。",en:"He wins every argument—except the ones with you."}};
function showPrologue(){
 const P=PLG[lang];
 const card=document.getElementById("plgCard");
 card.classList.toggle("fast",!!localStorage.getItem("flutter_prologue_seen"));
 card.innerHTML=`<div class="plg-star">🌙✨</div>`+
   P.p.map((t,i)=>`<p class="plg-p${i===3?" names":""}">${t}</p>`).join("")+
   `<button class="plg-btn" onclick="closePrologue()">${P.btn}</button>`;
 document.getElementById("prologueOv").classList.add("show");
}
function closePrologue(){
 localStorage.setItem("flutter_prologue_seen","1");
 document.getElementById("prologueOv").classList.remove("show");
}

async function boot(){
 R=await (await fetch(API+"/routes?lang="+lang)).json();
 document.getElementById("ssub").textContent="Flutter · "+tr().sub;
 document.getElementById("cards").innerHTML=R.routes.map(r=>{
   const g=`hsl(${r.hue},70%,92%)`,g2=`hsl(${r.hue},75%,84%)`;
   return `<div class="card" style="background:linear-gradient(135deg,${g},${g2})" onclick="startRoute('${r.id}')">
     <div class="por" style="background-image:url('portraits/${r.id}.jpg');background-size:cover;background-position:top center"></div>
     <div><div class="nm" style="color:${r.accent}">${r.name}</div>
       <div class="ti">${r.title}</div><div class="tg">${r.tag}</div>${HOOKS[r.id]?`<div class="hk">${HOOKS[r.id][lang]}</div>`:""}</div></div>`;}).join("");
 if(!localStorage.getItem("flutter_prologue_seen"))showPrologue();
}
function petals(hue){
 const p=document.getElementById("particles");p.innerHTML="";
 const set=["🌸","💗","✨","🌸","💮"];
 for(let i=0;i<14;i++){const e=document.createElement("div");e.className="petal";
   e.textContent=set[i%set.length];e.style.left=Math.random()*100+"%";
   e.style.animationDuration=(6+Math.random()*7)+"s";e.style.animationDelay=(-Math.random()*10)+"s";
   e.style.fontSize=(11+Math.random()*12)+"px";p.appendChild(e);}
}
function startRoute(id){
 route=R.routes.find(r=>r.id===id);
 document.documentElement.style.setProperty("--accent",route.accent);
 document.documentElement.style.setProperty("--hue",route.hue);
 const sv=localStorage.getItem("flutter_"+id);
 if(sv){const d=JSON.parse(sv);hist=d.hist||[];mem=d.mem||"";aff=d.aff||0;}else{hist=[];mem="";aff=0;}
 // scene bg
 const sc=document.getElementById("scene");
 sc.style.background=`linear-gradient(165deg,hsl(${route.hue},65%,88%),hsl(${(route.hue+30)%360},60%,90%) 55%,hsl(${(route.hue+330)%360},55%,86%))`;
 sc.innerHTML=`<div class="glow" style="width:60%;height:30%;top:8%;left:-10%;background:${route.accent}"></div>
   <div class="glow" style="width:50%;height:28%;bottom:12%;right:-8%;background:hsl(${route.hue},80%,75%);animation-delay:-3s"></div>`;
 petals(route.hue);
 {const _p=document.getElementById("portrait");_p.textContent="";updatePortrait();}
 document.getElementById("pet").textContent=R.pet.emoji;
 document.getElementById("cname").textContent=route.name;
 document.getElementById("afflab").textContent=tr().aff;
 document.getElementById("inp").placeholder=tr().ph;
 document.getElementById("send").textContent=tr().send;
 renderChips(); updateAff(false);
 document.getElementById("select").style.display="none";
 document.getElementById("game").style.display="flex";
 // 重逢台词 or 初见
 if(hist.length){const last=hist.filter(m=>m.role==="assistant").pop();
   typeLine(last?last.content:greeting());}
 else typeLine(greeting());
}
function greeting(){
 const g={guyan:{zh:"（抬头，轻轻一笑）你来了。今天想读点什么？",en:"(looks up, a soft smile) You're here. What shall we read today?"},
  luxingye:{zh:"（摘下口罩，眼睛亮起来）就知道你会来。想我了没？",en:"(pulls down his mask, eyes lighting up) I knew you'd come. Did you miss me?"},
  fushen:{zh:"（转过身，语气淡淡却放柔了）……来了。坐吧。",en:"(turns, voice cool but softening) ...You're here. Sit."}};
 return (g[route.id]||{})[lang]||"…";
}
function renderChips(){
 document.getElementById("chips").innerHTML=(tr().chips||T.en.chips).map(c=>
   `<span class="chip" onclick="quick('${c}')">${c}</span>`).join("");
}
function quick(c){document.getElementById("inp").value=c;say();}
let typing=null;
function typeLine(txt){
 clearInterval(typing);const el=document.getElementById("line");el.innerHTML="";
 let i=0;const cur='<span class="cursor">&nbsp;</span>';el.innerHTML=cur;
 typing=setInterval(()=>{i++;el.innerHTML=txt.slice(0,i).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]))+(i<txt.length?cur:"");
   if(i>=txt.length)clearInterval(typing);},26);
}
function exprFor(a){return a>=15?'_love':a>=8?'_blush':a>=3?'_smile':'';}
let lastExpr=null;
function updatePortrait(){const p=document.getElementById('portrait');
 const e=exprFor(aff);
 if(lastExpr!==null&&e!==lastExpr){p.style.transition='box-shadow .35s';p.style.boxShadow='0 0 0 6px rgba(255,255,255,.55),0 0 70px 14px var(--accent),0 16px 44px rgba(0,0,0,.28)';setTimeout(()=>{p.style.boxShadow='';},700);}
 lastExpr=e;
 p.style.backgroundImage="url('portraits/"+route.id+e+".jpg')";}
function updateAff(anim){ if(route) updatePortrait();
 document.getElementById("fill").style.width=aff+"%";
 document.getElementById("affpct").textContent=aff+"%";
}
function save(){localStorage.setItem("flutter_"+route.id,JSON.stringify({hist:hist.slice(-24),mem:mem,aff:aff}));}
async function say(){
 if(busy)return;const inp=document.getElementById("inp"),msg=inp.value.trim();if(!msg)return;
 inp.value="";busy=true;document.getElementById("send").disabled=true;
 typeLine(lang==="zh"?"（……）":"(…)");
 hist.push({role:"user",content:msg});
 try{
  const r=await (await fetch(API+"/say",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({route:route.id,history:hist.slice(0,-1),memory:mem,message:msg,affection:aff,lang:lang,pid:pid()})})).json();
  hist.push({role:"assistant",content:r.reply});
  if(r.memory_update)mem=(mem?mem+" ":"")+r.memory_update;
  const prev=aff;aff=r.affection;
  document.getElementById("mood").textContent=r.mood||"💗";
  updateAff(true);typeLine(r.reply);
  if(aff>prev)floatHeart();
  if(tierOf(aff)>tierOf(prev))maybeFbBar();
  if(r.milestone)celebrate(r.milestone);
  save();
 }catch(e){typeLine(lang==="zh"?"（信号断了…再说一次？）":"(connection lost… try again?)");}
 busy=false;document.getElementById("send").disabled=false;
}
function floatHeart(){const b=document.getElementById("portrait").getBoundingClientRect();
 const h=document.createElement("div");h.textContent="♡";h.style.cssText=`position:fixed;left:${b.left+b.width/2}px;top:${b.top}px;z-index:16;font-size:1.6em;color:var(--accent);pointer-events:none;transition:all 1.1s ease-out;opacity:1`;
 document.body.appendChild(h);requestAnimationFrame(()=>{h.style.top=(b.top-90)+"px";h.style.opacity="0";});setTimeout(()=>h.remove(),1100);}
function celebrate(txt){
 const ms=document.getElementById("ms"),big=document.getElementById("msbig");
 big.textContent=(tr().ms&&tr().ms[txt])||txt;ms.style.display="flex";
 for(let i=0;i<18;i++){const b=document.createElement("div");b.className="burst";b.textContent=["💗","🌸","✨","💖"][i%4];
   b.style.left="50%";b.style.top="50%";b.style.setProperty("--dx",(Math.random()*300-150)+"px");
   b.style.setProperty("--dy",(Math.random()*300-150)+"px");ms.appendChild(b);setTimeout(()=>b.remove(),1100);}
 setTimeout(()=>{ms.style.display="none";},1700);
}
function goSelect(){document.getElementById("game").style.display="none";document.getElementById("select").style.display="flex";}
function pid(){let p=localStorage.getItem("flutter_pid");if(!p){p=Math.random().toString(36).slice(2)+Date.now().toString(36);localStorage.setItem("flutter_pid",p);}return p;}
function toggleLang(){lang=lang==="zh"?"en":"zh";
 if(document.getElementById("prologueOv").classList.contains("show"))showPrologue();
 if(document.getElementById("fbOv").classList.contains("show"))openFb();
 if(route){renderChips();document.getElementById("afflab").textContent=tr().aff;document.getElementById("inp").placeholder=tr().ph;document.getElementById("send").textContent=tr().send;}else boot();}
document.getElementById("inp").addEventListener("keydown",e=>{if(e.key==="Enter")say();});
// 软键盘弹出时保证输入条与对话框可见
document.getElementById("inp").addEventListener("focus",()=>{setTimeout(()=>{
 document.querySelector(".dbox").scrollIntoView({block:"end",behavior:"smooth"});},300);});
/* ---------- 反馈 Feedback ---------- */
const FBT={zh:{q:"喜欢和他聊天吗？",ph:"想对制作人说…（可选）",send:"发送 ♡",done:"收到啦♡"},
 en:{q:"Enjoying him?",ph:"A word for the makers… (optional)",send:"Send ♡",done:"Got it ♡"}};
let fbScore=0;
if(API)document.getElementById("fbBtn").style.display="";
function tierOf(a){return a>=15?3:a>=8?2:a>=3?1:0;}
function fbEmos(sel,fn){return [["😍",3],["😐",2],["🥱",1]].map(([e,s])=>
 `<button class="fb-emo${sel===s?" sel":""}" onclick="${fn}(${s})">${e}</button>`).join("");}
function openFb(){
 if(!API)return;fbScore=0;
 const t=FBT[lang];
 document.getElementById("fbCard").innerHTML=`<button class="fb-x" onclick="closeFb()">✕</button>
  <div class="fb-q">${t.q}</div>
  <div class="fb-emos" id="fbEmos">${fbEmos(0,"pickFb")}</div>
  <textarea class="fb-note" id="fbNote" rows="2" placeholder="${t.ph}"></textarea>
  <button class="fb-send" id="fbSend" onclick="sendFb()" disabled>${t.send}</button>`;
 document.getElementById("fbOv").classList.add("show");
}
function closeFb(){document.getElementById("fbOv").classList.remove("show");}
function pickFb(s){fbScore=s;
 document.getElementById("fbEmos").innerHTML=fbEmos(s,"pickFb");
 document.getElementById("fbSend").disabled=false;}
function postFb(score,note){
 try{fetch(API+"/scout/api/game_feedback",{method:"POST",headers:{"Content-Type":"application/json"},
  body:JSON.stringify({game:"flutter",score:score,note:note||"",pid:pid()})}).catch(()=>{});}catch(e){}
}
function sendFb(){
 if(!fbScore)return;
 postFb(fbScore,(document.getElementById("fbNote")||{}).value.trim());
 document.getElementById("fbCard").innerHTML=`<div class="fb-done">${FBT[lang].done}</div>`;
 setTimeout(closeFb,1200);
}
function maybeFbBar(){
 if(!API)return;
 const today=new Date().toISOString().slice(0,10);
 if(localStorage.getItem("flutter_fb_last")===today)return;
 localStorage.setItem("flutter_fb_last",today);
 setTimeout(()=>{
  const bar=document.getElementById("fbBar"),t=FBT[lang];
  bar.innerHTML=`<div class="fb-q">${t.q}</div>${fbEmos(0,"pickFbBar")}
   <button class="fb-x" style="position:static" onclick="hideFbBar()">✕</button>`;
  bar.classList.add("show");
 },2000);
}
function hideFbBar(){document.getElementById("fbBar").classList.remove("show");}
function pickFbBar(s){
 postFb(s,"");
 document.getElementById("fbBar").innerHTML=`<div class="fb-q" style="text-align:center">${FBT[lang].done}</div>`;
 setTimeout(hideFbBar,1400);
}
boot();
</script></body></html>
