<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>MingXi 明析 · 命理为骨，经典为魂</title><script src="config.js"></script>
<style>
:root{--ink0:#100f0c;--ink1:#171512;--ink2:#1f1c17;--paper:#e8e0cf;--dim:#9a917d;--dim2:#6f6858;--cinnabar:#c3402b;--gold:#c9a25e;--gold2:#a9853f;--line:#332e26;
--sh-sm:0 1px 2px rgba(0,0,0,.4);
--sh-md:0 2px 6px rgba(0,0,0,.35),0 14px 32px -10px rgba(0,0,0,.5);
--ring:0 0 0 3px rgba(201,162,94,.22)}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei','Segoe UI',sans-serif;margin:0;color:var(--paper);-webkit-font-smoothing:antialiased;
background:var(--ink1);background-image:radial-gradient(1100px 500px at 85% -8%,rgba(201,162,94,.07),transparent 60%),radial-gradient(900px 460px at -10% 10%,rgba(195,64,43,.05),transparent 55%),linear-gradient(180deg,var(--ink1),var(--ink0))}
.serif{font-family:'Songti SC','Noto Serif SC',Georgia,'Times New Roman',serif}
/* ── 吸顶毛玻璃栏 ── */
.bar{position:sticky;top:0;z-index:40;background:rgba(16,15,12,.82);backdrop-filter:blur(14px) saturate(1.3);-webkit-backdrop-filter:blur(14px) saturate(1.3);
color:var(--paper);padding:13px 24px;display:flex;align-items:baseline;gap:12px;border-bottom:1px solid rgba(201,162,94,.22)}
.bar .wm{font-family:'Songti SC',Georgia,serif;font-size:1.25em;letter-spacing:6px;font-weight:700}
.bar .wm i{color:var(--cinnabar);font-style:normal}
.bar .en{font-size:.78em;color:var(--dim2);letter-spacing:3px}
.bar .langbtn{margin-left:auto;background:rgba(232,224,207,.05);border:1px solid rgba(201,162,94,.3);border-radius:999px;padding:5px 15px;color:var(--dim);font-size:.8em;cursor:pointer;transition:all .18s ease}
.bar .langbtn:hover{border-color:var(--gold);color:var(--paper);background:rgba(201,162,94,.15)}
/* ── 主体 ── */
.wrap{max-width:780px;margin:0 auto;padding:52px 22px 72px;position:relative}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.wrap>*{animation:fadeUp .55s cubic-bezier(.2,.7,.3,1) both}
.wrap>*:nth-child(3){animation-delay:.06s}.wrap>*:nth-child(4){animation-delay:.12s}
.wrap>*:nth-child(5){animation-delay:.18s}.wrap>*:nth-child(6){animation-delay:.22s}
.wrap>*:nth-child(7){animation-delay:.26s}.wrap>*:nth-child(8){animation-delay:.3s}
.wrap>*:nth-child(9){animation-delay:.34s}.wrap>*:nth-child(10){animation-delay:.38s}
.eyebrow{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(201,162,94,.45);background:rgba(201,162,94,.07);color:var(--gold);
border-radius:999px;padding:5px 14px;font-size:.74em;font-weight:700;letter-spacing:2.5px;margin-bottom:18px}
.eyebrow::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--cinnabar)}
h1{font-family:'Songti SC','Noto Serif SC',Georgia,serif;font-size:clamp(1.9em,4.8vw,2.6em);line-height:1.25;letter-spacing:1px;margin:0 0 14px;color:var(--paper)}
h1 em{font-style:normal;color:var(--gold)}
.sub{color:var(--dim);font-size:1.03em;line-height:1.8;margin-bottom:22px;max-width:640px}
.chips{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:38px}
.chip{border:1px solid var(--line);background:rgba(31,28,23,.8);border-radius:999px;padding:7px 16px;font-size:.82em;color:var(--dim);box-shadow:var(--sh-sm);transition:all .18s ease}
.chip:hover{transform:translateY(-1px);box-shadow:var(--sh-md);border-color:rgba(201,162,94,.5)}
.chip b{color:var(--gold)}
/* ── 步骤 ── */
.step{display:flex;gap:14px;margin:30px 0 12px;align-items:baseline}
.step .no{font-family:'Songti SC',Georgia,serif;color:var(--cinnabar);font-size:1.2em;font-weight:700;min-width:34px}
.step .st{font-weight:700;font-size:1.04em;color:var(--paper);letter-spacing:.5px}
.step .ic{width:17px;height:17px;stroke:var(--gold);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;vertical-align:-3px;margin-right:4px}
.card{background:rgba(31,28,23,.9);border:1px solid var(--line);border-radius:16px;padding:24px 26px;box-shadow:var(--sh-md)}
label{display:block;margin:16px 0 7px;font-weight:600;font-size:.88em;color:var(--gold);letter-spacing:.5px}
label:first-child{margin-top:0}
label small{color:var(--dim2);font-weight:400}
input,select,textarea{width:100%;padding:13px 14px;border:1.5px solid var(--line);border-radius:11px;font-size:1em;background:#14120e;color:var(--paper);font-family:inherit;transition:border-color .18s ease,box-shadow .18s ease;appearance:none}
input::placeholder,textarea::placeholder{color:#5b5546}
input:focus,textarea:focus{outline:none;border-color:var(--gold);box-shadow:var(--ring)}
textarea{resize:vertical;line-height:1.7}
button.go{margin-top:24px;width:100%;padding:16px;border:0;border-radius:12px;background:linear-gradient(180deg,#d14a33,#9c3220);color:#f6ead9;font-size:1.08em;letter-spacing:4px;cursor:pointer;font-weight:700;font-family:'Songti SC',Georgia,serif;box-shadow:0 2px 8px rgba(195,64,43,.35),inset 0 1px 0 rgba(255,255,255,.12);transition:all .18s ease}
button.go:hover{transform:translateY(-1.5px);box-shadow:0 6px 20px rgba(195,64,43,.4),0 2px 8px rgba(201,162,94,.25),inset 0 1px 0 rgba(255,255,255,.15)}
button.go:active{transform:translateY(0) scale(.995)}
button.go:disabled{opacity:.55;cursor:wait;transform:none}
/* ── 判词/报告 ── */
.report{display:none;margin-top:34px;background:#1a1712;border:1px solid rgba(201,162,94,.28);border-radius:16px;overflow:hidden;box-shadow:var(--sh-md)}
.report.on{display:block;animation:fadeUp .45s ease both}
.rhead{background:linear-gradient(135deg,#221e17,#1a1712);color:var(--paper);padding:14px 22px;font-family:'Songti SC',Georgia,serif;letter-spacing:4px;font-size:.94em;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid rgba(195,64,43,.5)}
.rhead .seal{color:var(--cinnabar);border:1.5px solid var(--cinnabar);border-radius:4px;padding:2px 6px;font-size:.85em;letter-spacing:2px}
#out{white-space:pre-wrap;padding:22px 24px;line-height:1.9;font-size:.98em;min-height:60px;color:#ded5c1}
.cursor::after{content:"▋";color:var(--cinnabar);animation:bl 1s infinite}@keyframes bl{50%{opacity:0}}
/* ── 反馈/页脚 ── */
.fb{margin-top:16px;text-align:center;color:var(--dim);font-size:.9em}
.fb span{cursor:pointer;font-size:1.35em;margin:0 8px;display:inline-block;transition:transform .15s ease}
.fb span:hover{transform:scale(1.25)}
.foot{margin-top:52px;border-top:1px solid var(--line);padding-top:18px;color:var(--dim2);font-size:.78em;line-height:1.8;text-align:center;max-width:640px;margin-left:auto;margin-right:auto}
/* ── 水印：先天八卦环 + 朱砂方印 ── */
.bagua-art{position:absolute;top:16px;right:-40px;width:320px;height:320px;opacity:.06;pointer-events:none;color:var(--gold);z-index:-1;animation:none!important}
.seal-art{position:absolute;bottom:120px;left:-6px;width:96px;height:96px;opacity:.1;pointer-events:none;color:var(--cinnabar);z-index:-1;animation:none!important}
@media(max-width:820px){.bagua-art{width:210px;right:-50px;opacity:.05}.seal-art{display:none}}
</style></head><body>
<div class="bar"><span class="wm">明<i>析</i></span><span class="en">MING XI</span>
<button class="langbtn" onclick="toggleLang()">中 / EN</button></div>
<div class="wrap">
<!-- 先天八卦环水印：8组爻线(乾兑离震巽坎艮坤)环形排列 -->
<svg class="bagua-art" viewBox="0 0 240 240" aria-hidden="true">
 <circle cx="120" cy="120" r="112" fill="none" stroke="currentColor" stroke-width="2"/>
 <circle cx="120" cy="120" r="60" fill="none" stroke="currentColor" stroke-width="1"/>
 <path d="M120 90 a30 30 0 0 1 0 60 a15 15 0 0 1 0 -30 a15 15 0 0 0 0 -30z" fill="currentColor" opacity=".6"/>
 <circle cx="120" cy="105" r="4" fill="currentColor"/><circle cx="120" cy="135" r="4" fill="none" stroke="currentColor" stroke-width="1.5"/>
 <!-- 每卦三爻，阳=整线，阴=断线；g旋转45°排布 -->
 <g stroke="currentColor" stroke-width="5" fill="none">
  <!-- 乾 ☰ (0°, 上) -->
  <g transform="rotate(0 120 120)"><path d="M96 26h48M96 36h48M96 46h48"/></g>
  <!-- 兑 ☱ (45°) -->
  <g transform="rotate(45 120 120)"><path d="M96 26h21m6 0h21M96 36h48M96 46h48"/></g>
  <!-- 离 ☲ (90°) -->
  <g transform="rotate(90 120 120)"><path d="M96 26h48M96 36h21m6 0h21M96 46h48"/></g>
  <!-- 震 ☳ (135°) -->
  <g transform="rotate(135 120 120)"><path d="M96 26h21m6 0h21M96 36h21m6 0h21M96 46h48"/></g>
  <!-- 坤 ☷ (180°, 下) -->
  <g transform="rotate(180 120 120)"><path d="M96 26h21m6 0h21M96 36h21m6 0h21M96 46h21m6 0h21"/></g>
  <!-- 艮 ☶ (225°) -->
  <g transform="rotate(225 120 120)"><path d="M96 26h48M96 36h21m6 0h21M96 46h21m6 0h21"/></g>
  <!-- 坎 ☵ (270°) -->
  <g transform="rotate(270 120 120)"><path d="M96 26h21m6 0h21M96 36h48M96 46h21m6 0h21"/></g>
  <!-- 巽 ☴ (315°) -->
  <g transform="rotate(315 120 120)"><path d="M96 26h48M96 36h48M96 46h21m6 0h21"/></g>
 </g>
</svg>
<!-- 朱砂方印水印："明析"篆意笔画示意 -->
<svg class="seal-art" viewBox="0 0 96 96" aria-hidden="true">
 <rect x="4" y="4" width="88" height="88" rx="8" fill="none" stroke="currentColor" stroke-width="5"/>
 <g stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="square">
  <!-- 明(左)：日+月示意 -->
  <path d="M16 20h13v26H16zM16 33h13"/>
  <path d="M35 20h10v34c0 5-2 8-7 8M35 32h10"/>
  <!-- 析(右)：木+斤示意 -->
  <path d="M58 18v40M50 30h16M52 44l-6 10M64 44l6 10"/>
  <path d="M74 22c4-2 8-2 10 0M76 22v36M76 36h10v22"/>
 </g>
</svg>
  <div class="eyebrow" id="eyebrow"></div>
  <h1 id="h1"></h1>
  <div class="sub" id="sub"></div>
  <div class="chips" id="chips"></div>

  <div class="step"><span class="no">壹</span><span class="st"><svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 3v18M3 12h18"/></svg><span id="s1"></span></span></div>
  <div class="card">
    <label id="lb1" for="birth"></label><input id="birth" type="text">
  </div>

  <div class="step"><span class="no">贰</span><span class="st"><svg class="ic" viewBox="0 0 24 24"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><path d="M9 13h6M9 17h4"/></svg><span id="s2"></span></span></div>
  <div class="card">
    <label id="lb2" for="concern"></label>
    <textarea id="concern" rows="7"></textarea>
    <button id="go" class="go" onclick="ask()"></button>
  </div>

  <div class="report" id="report">
    <div class="rhead"><span id="rt"></span><span class="seal serif">明析</span></div>
    <div id="out"></div>
  </div>
  <div class="fb" id="fbrow" style="display:none"><span id="fbq"></span> <span onclick="fb(1)">👍</span><span onclick="fb(-1)">👎</span></div>

  <div class="foot" id="foot"></div>
</div>
<script>
let lang = navigator.language.startsWith("zh") ? "Chinese" : "English";
const I18N = {
 Chinese: {
  eyebrow:"命理为骨 · 经典为魂 · MING XI",
  h1:"不是安慰你，是算给你看。",
  sub:"以八字排盘起局，用易经、道德经与千年经典解读你当下的处境与选择，辅以现代心理学视角——给你一个有骨架的答案，而非泛泛的鸡汤。",
  chips:["<b>精确排盘</b> · 非泛泛而谈","<b>千年典籍为据</b> · 有出处可查","<b>生辰信息不存档</b> · 即算即焚"],
  s1:"报上生辰（可选）", s2:"说出你的困局",
  lb1:"出生日期与时辰 <small>选填 · 例：1995-03-14 卯时；提供后可精确排盘</small>",
  lb2:"你正在纠结什么？<small>换工作、感情去留、时机选择……说得越具体，判得越准</small>",
  go:"起 局 断 事", rt:"判 词 · READING", fbq:"这次解读，判得准吗？",
  phBirth:"例：1995-03-14 卯时（不填也可以，按事起卦）",
  phConcern:"例：手上有个 offer，薪水高但要离开现在的城市，家里人反对，我拿不定主意……",
  foot:"明析以八字、易经等传统文化视角提供人生参考，不构成医疗、法律或投资建议。你的生辰与困惑仅用于本次推演，服务器不留存。"
 },
 English: {
  eyebrow:"CALCULATION AS BONE · CLASSICS AS SOUL · MING XI",
  h1:"Not comfort. Calculation.",
  sub:"We cast your BaZi chart first, then read your situation through the I Ching, the Tao Te Ching and a millennium of classics — with modern psychology as a supporting lens. An answer with a skeleton, not a platitude.",
  chips:["<b>Precise charting</b> · never generic","<b>Grounded in the classics</b> · sources you can check","<b>Birth data never stored</b>"],
  s1:"Your birth moment (optional)", s2:"Name your dilemma",
  lb1:"Birth date & hour <small>optional · e.g. 1995-03-14, Mao hour (5–7am); enables a precise chart</small>",
  lb2:"What are you torn about? <small>a job, a relationship, timing… the more specific, the sharper the reading</small>",
  go:"CAST THE READING", rt:"READING · 判词", fbq:"Was this reading on point?",
  phBirth:"e.g. 1995-03-14, around 6am (optional — we can divine from the question alone)",
  phConcern:"e.g. I have an offer with better pay but it means leaving my city; my family objects and I can't decide…",
  foot:"MingXi offers life perspective through BaZi, I Ching and other traditional lenses. It is not medical, legal or investment advice. Your birth data and question are used for this reading only and never stored."
 }
};
function render(){
  const t=I18N[lang];
  document.getElementById("eyebrow").textContent=t.eyebrow;
  h1.textContent=t.h1; sub.textContent=t.sub;
  chips.innerHTML=t.chips.map(c=>`<span class="chip">${c}</span>`).join("");
  s1.textContent=t.s1; s2.textContent=t.s2;
  lb1.innerHTML=t.lb1; lb2.innerHTML=t.lb2;
  document.getElementById("go").textContent=t.go;
  rt.textContent=t.rt; fbq.textContent=t.fbq; foot.textContent=t.foot;
  document.getElementById("birth").placeholder=t.phBirth;
  document.getElementById("concern").placeholder=t.phConcern;
}
function toggleLang(){ lang = lang==="Chinese"?"English":"Chinese"; render(); }
render();
async function ask() {
  const btn = document.getElementById("go"), out = document.getElementById("out");
  btn.disabled = true; document.getElementById("report").classList.add("on");
  out.classList.add("cursor"); out.textContent = "";
  try {
    const resp = await fetch(window.APP_API + "/mingxi/ask_stream", {method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({payload: {birth: document.getElementById("birth").value,concern: document.getElementById("concern").value}, lang: lang})});
    const rd = resp.body.getReader(), dec = new TextDecoder(); let buf = "";
    while (true) {
      const {done, value} = await rd.read(); if (done) break;
      buf += dec.decode(value, {stream: true});
      let i; while ((i = buf.indexOf("\n\n")) >= 0) {
        const line = buf.slice(0, i).trim(); buf = buf.slice(i + 2);
        if (!line.startsWith("data: ")) continue;
        const d = JSON.parse(line.slice(6));
        if (d.token) out.textContent += d.token;
      }
    }
    document.getElementById("fbrow").style.display="block";
  } catch (e) { out.textContent = "Error: " + e; }
  out.classList.remove("cursor"); btn.disabled = false;
}
function fb(s) { fetch(window.APP_API + "/mingxi/feedback", {method: "POST",
  headers: {"Content-Type": "application/json"}, body: JSON.stringify({score: s})}); alert(lang==="Chinese"?"已收到，谢谢！":"Thanks!"); }
</script><script>try{fetch(window.APP_API+"/scout/api/visit?app_=mingxi&src="+(new URLSearchParams(location.search).get("src")||"")+"&ref="+encodeURIComponent(document.referrer))}catch(e){}</script></body></html>
