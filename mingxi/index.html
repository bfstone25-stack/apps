<!DOCTYPE html><html lang="zh"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>MingXi 明析 · 命理为骨，经典为魂</title><script src="config.js"></script>
<style>
:root{--ink0:#100f0c;--ink1:#171512;--ink2:#1f1c17;--paper:#e8e0cf;--dim:#9a917d;--dim2:#6f6858;--cinnabar:#c3402b;--gold:#c9a25e;--gold2:#a9853f;--line:#332e26;
--sh-sm:0 1px 2px rgba(0,0,0,.4);
--sh-md:0 2px 6px rgba(0,0,0,.35),0 14px 32px -10px rgba(0,0,0,.5);
--ring:0 0 0 3px rgba(201,162,94,.22)}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei','Segoe UI',sans-serif;margin:0;color:var(--paper);-webkit-font-smoothing:antialiased;
background:var(--ink1);background-image:radial-gradient(1100px 500px at 50% -8%,rgba(201,162,94,.07),transparent 60%),radial-gradient(900px 460px at 50% 110%,rgba(195,64,43,.05),transparent 55%),linear-gradient(180deg,var(--ink1),var(--ink0))}
.serif{font-family:'Songti SC','Noto Serif SC',Georgia,'Times New Roman',serif}
/* ── 吸顶栏（极简，只留语言切换）── */
.bar{position:sticky;top:0;z-index:40;background:rgba(16,15,12,.82);backdrop-filter:blur(14px) saturate(1.3);-webkit-backdrop-filter:blur(14px) saturate(1.3);
color:var(--paper);padding:10px 20px;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px solid rgba(201,162,94,.18)}
.bar .langbtn{background:rgba(232,224,207,.05);border:1px solid rgba(201,162,94,.3);border-radius:999px;padding:5px 15px;color:var(--dim);font-size:.8em;cursor:pointer;transition:all .18s ease}
.bar .langbtn:hover{border-color:var(--gold);color:var(--paper);background:rgba(201,162,94,.15)}
/* ── 立轴主体：窄幅居中 ── */
.wrap{max-width:560px;margin:0 auto;padding:56px 22px 80px;position:relative;text-align:center}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.wrap>*{animation:fadeUp .55s cubic-bezier(.2,.7,.3,1) both}
.wrap>*:nth-child(3){animation-delay:.06s}.wrap>*:nth-child(4){animation-delay:.12s}
.wrap>*:nth-child(5){animation-delay:.18s}.wrap>*:nth-child(6){animation-delay:.22s}
.wrap>*:nth-child(7){animation-delay:.26s}.wrap>*:nth-child(8){animation-delay:.3s}
.wrap>*:nth-child(9){animation-delay:.34s}.wrap>*:nth-child(10){animation-delay:.38s}
.wrap>*:nth-child(11){animation-delay:.42s}.wrap>*:nth-child(12){animation-delay:.46s}
/* ── 店招题签：竖排 ── */
.plaque{display:flex;justify-content:center;align-items:flex-start;gap:18px;margin-bottom:10px}
.plaque .title{writing-mode:vertical-rl;font-family:'Songti SC','Noto Serif SC',Georgia,serif;font-size:clamp(2.6em,9vw,3.4em);font-weight:700;letter-spacing:.22em;line-height:1.1;color:var(--paper)}
.plaque .title i{font-style:normal;color:var(--cinnabar)}
.plaque .motto{writing-mode:vertical-rl;font-family:'Songti SC','Noto Serif SC',Georgia,serif;font-size:.86em;letter-spacing:.35em;color:var(--gold);opacity:.85;padding-top:8px}
.goldline{width:180px;height:1px;margin:22px auto 8px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.7}
/* 英文模式：竖排回横排 */
html[lang="en"] .plaque{flex-direction:column;align-items:center;gap:6px}
html[lang="en"] .plaque .title,html[lang="en"] .plaque .motto{writing-mode:horizontal-tb}
html[lang="en"] .plaque .title{letter-spacing:.1em}
html[lang="en"] .plaque .motto{letter-spacing:.18em;padding-top:0}
.sub{color:var(--dim);font-size:.98em;line-height:1.9;margin:14px auto 8px;max-width:460px}
.chips{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;margin:16px 0 8px}
.chip{border:1px solid var(--line);background:rgba(31,28,23,.8);border-radius:999px;padding:6px 14px;font-size:.78em;color:var(--dim);box-shadow:var(--sh-sm)}
.chip b{color:var(--gold)}
/* ── 八卦环：页面正中背景主角 ── */
.bagua-art{position:absolute;top:46%;left:50%;transform:translate(-50%,-50%);width:480px;height:480px;max-width:120vw;opacity:.065;pointer-events:none;color:var(--gold);z-index:-1;animation:none!important}
/* ── 分隔符：云纹/莲花 ── */
.divider{display:flex;justify-content:center;margin:34px 0 14px;color:var(--gold);opacity:.55;animation:none}
.divider svg{width:110px;height:22px}
/* ── 进：问签段落 ── */
.stage{font-family:'Songti SC','Noto Serif SC',Georgia,serif;font-size:1.06em;letter-spacing:.4em;color:var(--paper);margin-bottom:14px;font-weight:700}
.stage::before,.stage::after{content:"·";color:var(--cinnabar);margin:0 10px;letter-spacing:0}
.card{background:rgba(31,28,23,.72);border:1px solid var(--line);border-radius:14px;padding:22px 24px;box-shadow:var(--sh-md);text-align:left;backdrop-filter:blur(2px)}
label{display:block;margin:0 0 8px;font-weight:600;font-size:.88em;color:var(--gold);letter-spacing:.5px}
label small{color:var(--dim2);font-weight:400}
input,select,textarea{width:100%;padding:13px 14px;border:1.5px solid var(--line);border-radius:11px;font-size:1em;background:rgba(20,18,14,.85);color:var(--paper);font-family:inherit;transition:border-color .18s ease,box-shadow .18s ease;appearance:none}
input::placeholder,textarea::placeholder{color:#5b5546}
input:focus,textarea:focus{outline:none;border-color:var(--gold);box-shadow:var(--ring)}
textarea{resize:vertical;line-height:1.7}
/* ── 朱砂方印 CTA ── */
.sealwrap{margin-top:34px;display:flex;flex-direction:column;align-items:center;gap:12px}
button.go{width:92px;height:92px;padding:0;border:0;border-radius:10px;cursor:pointer;position:relative;
background:linear-gradient(160deg,#d14a33,#9c3220);color:#f6ead9;
font-family:'Songti SC','Noto Serif SC',Georgia,serif;font-size:1.5em;font-weight:700;letter-spacing:.12em;line-height:1.15;
box-shadow:0 4px 14px rgba(195,64,43,.4),0 10px 30px -8px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.14);
transition:all .16s ease}
button.go::before{content:"";position:absolute;inset:6px;border:1.5px solid rgba(246,234,217,.55);border-radius:6px;pointer-events:none}
button.go:hover{transform:translateY(2px) scale(.97);box-shadow:0 2px 6px rgba(195,64,43,.5),0 4px 12px -4px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.1)}
button.go:active{transform:translateY(3px) scale(.95);box-shadow:0 1px 3px rgba(195,64,43,.5),inset 0 2px 6px rgba(0,0,0,.3)}
button.go:disabled{opacity:.55;cursor:wait;transform:none}
html[lang="en"] button.go{width:auto;min-width:92px;height:92px;padding:0 20px;font-size:.95em;letter-spacing:.2em}
.sealhint{color:var(--dim2);font-size:.78em;letter-spacing:1px}
/* ── 判词：展卷 ── */
.report{margin-top:40px;background:#1a1712;border:1px solid rgba(201,162,94,.28);border-radius:14px;box-shadow:var(--sh-md);text-align:left;position:relative;
max-height:0;opacity:0;overflow:hidden;visibility:hidden;
transition:max-height 1.4s cubic-bezier(.25,.6,.3,1),opacity .8s ease .1s}
.report.on{max-height:8000px;opacity:1;visibility:visible;overflow:visible}
.report .corner-seal{position:absolute;top:-12px;right:18px;background:linear-gradient(160deg,#d14a33,#9c3220);color:#f6ead9;font-family:'Songti SC',Georgia,serif;
font-size:.72em;letter-spacing:2px;padding:5px 8px;border-radius:4px;box-shadow:0 2px 8px rgba(195,64,43,.4)}
.report .corner-seal::before{content:"";position:absolute;inset:3px;border:1px solid rgba(246,234,217,.5);border-radius:2px}
.rhead{color:var(--paper);padding:16px 24px 12px;font-family:'Songti SC',Georgia,serif;letter-spacing:5px;font-size:.92em;text-align:center;border-bottom:1px solid rgba(195,64,43,.4)}
#out{white-space:pre-wrap;padding:24px 26px;line-height:2;font-size:.98em;min-height:60px;color:#ded5c1;font-family:'Songti SC','Noto Serif SC',Georgia,'Times New Roman',serif}
.cursor::after{content:"▋";color:var(--cinnabar);animation:bl 1s infinite}@keyframes bl{50%{opacity:0}}
/* ── 反馈/页脚 ── */
.fb{margin-top:16px;text-align:center;color:var(--dim);font-size:.9em}
.fb span{cursor:pointer;font-size:1.35em;margin:0 8px;display:inline-block;transition:transform .15s ease}
.fb span:hover{transform:scale(1.25)}
.foot{margin-top:56px;border-top:1px solid var(--line);padding-top:18px;color:var(--dim2);font-size:.78em;line-height:1.8;text-align:center}
@media(max-width:600px){.bagua-art{width:360px;height:360px;opacity:.055}}
</style></head><body>
<div class="bar"><button class="langbtn" onclick="toggleLang()">中 / EN</button></div>
<div class="wrap">
<!-- 先天八卦环水印：页面正中背景，起局盘面 -->
<svg class="bagua-art" viewBox="0 0 240 240" aria-hidden="true">
 <circle cx="120" cy="120" r="112" fill="none" stroke="currentColor" stroke-width="2"/>
 <circle cx="120" cy="120" r="60" fill="none" stroke="currentColor" stroke-width="1"/>
 <path d="M120 90 a30 30 0 0 1 0 60 a15 15 0 0 1 0 -30 a15 15 0 0 0 0 -30z" fill="currentColor" opacity=".6"/>
 <circle cx="120" cy="105" r="4" fill="currentColor"/><circle cx="120" cy="135" r="4" fill="none" stroke="currentColor" stroke-width="1.5"/>
 <!-- 每卦三爻，阳=整线，阴=断线；g旋转45°排布 -->
 <g stroke="currentColor" stroke-width="5" fill="none">
  <g transform="rotate(0 120 120)"><path d="M96 26h48M96 36h48M96 46h48"/></g>
  <g transform="rotate(45 120 120)"><path d="M96 26h21m6 0h21M96 36h48M96 46h48"/></g>
  <g transform="rotate(90 120 120)"><path d="M96 26h48M96 36h21m6 0h21M96 46h48"/></g>
  <g transform="rotate(135 120 120)"><path d="M96 26h21m6 0h21M96 36h21m6 0h21M96 46h48"/></g>
  <g transform="rotate(180 120 120)"><path d="M96 26h21m6 0h21M96 36h21m6 0h21M96 46h21m6 0h21"/></g>
  <g transform="rotate(225 120 120)"><path d="M96 26h48M96 36h21m6 0h21M96 46h21m6 0h21"/></g>
  <g transform="rotate(270 120 120)"><path d="M96 26h21m6 0h21M96 36h48M96 46h21m6 0h21"/></g>
  <g transform="rotate(315 120 120)"><path d="M96 26h48M96 36h48M96 46h21m6 0h21"/></g>
 </g>
</svg>

<!-- 店招题签：竖排「明析」+ 竖排小字 -->
<div class="plaque">
  <span class="title" id="h1">明<i>析</i></span>
  <span class="motto" id="motto">命理为骨 · 经典为魂</span>
</div>
<div class="goldline"></div>
<div class="sub" id="sub"></div>
<div class="chips" id="chips"></div>

<!-- 第一进：录生辰 -->
<div class="divider" aria-hidden="true"><svg viewBox="0 0 110 22" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round">
  <path d="M4 11h30M76 11h30"/>
  <path d="M55 4c-3 3-8 4-8 8 0 3 3 6 8 6s8-3 8-6c0-4-5-5-8-8z"/>
  <path d="M47 14c-2-1-5-1-7 1M63 14c2-1 5-1 7 1"/>
</svg></div>
<div class="stage" id="s1"></div>
<div class="card">
  <label id="lb1" for="birth"></label><input id="birth" type="text">
</div>

<!-- 第二进：述心事 -->
<div class="divider" aria-hidden="true"><svg viewBox="0 0 110 22" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round">
  <path d="M4 11h28M78 11h28"/>
  <path d="M40 11c3-5 8-5 10 0 2 5 8 5 10 0 2-5 8-5 10 0"/>
</svg></div>
<div class="stage" id="s2"></div>
<div class="card">
  <label id="lb2" for="concern"></label>
  <textarea id="concern" rows="7"></textarea>
</div>

<!-- 朱砂方印 CTA -->
<div class="sealwrap">
  <button id="go" class="go" onclick="ask()"></button>
  <span class="sealhint" id="sealhint"></span>
</div>

<!-- 判词展卷 -->
<div class="report" id="report">
  <span class="corner-seal serif">明析</span>
  <div class="rhead"><span id="rt"></span></div>
  <div id="out"></div>
</div>
<div class="fb" id="fbrow" style="display:none"><span id="fbq"></span> <span onclick="fb(1)">👍</span><span onclick="fb(-1)">👎</span></div>

<div class="foot" id="foot"></div>
</div>
<script>
let lang = navigator.language.startsWith("zh") ? "Chinese" : "English";
const I18N = {
 Chinese: {
  h1:"明<i>析</i>", motto:"命理为骨 · 经典为魂",
  sub:"以八字排盘起局，用易经、道德经与千年经典解读你当下的处境与选择，辅以现代心理学视角——给你一个有骨架的答案，而非泛泛的鸡汤。",
  chips:["<b>精确排盘</b> · 非泛泛而谈","<b>千年典籍为据</b> · 有出处可查","<b>生辰信息不存档</b> · 即算即焚"],
  s1:"录生辰", s2:"述心事",
  lb1:"生辰八字 · 年月日时 <small>选填 · 例：1995-03-14 卯时；提供后可精确排盘</small>",
  lb2:"你正在纠结什么？<small>换工作、感情去留、时机选择……说得越具体，判得越准</small>",
  go:"起局", sealhint:"即算即焚 · 生辰不存档",
  rt:"判 词 · READING", fbq:"这次解读，判得准吗？",
  phBirth:"例：1995-03-14 卯时（不填也可以，按事起卦）",
  phConcern:"例：手上有个 offer，薪水高但要离开现在的城市，家里人反对，我拿不定主意……",
  foot:"明析以八字、易经等传统文化视角提供人生参考，不构成医疗、法律或投资建议。你的生辰与困惑仅用于本次推演，服务器不留存。"
 },
 English: {
  h1:"MING <i>XI</i>", motto:"CALCULATION AS BONE · CLASSICS AS SOUL",
  sub:"We cast your BaZi chart first, then read your situation through the I Ching, the Tao Te Ching and a millennium of classics — with modern psychology as a supporting lens. An answer with a skeleton, not a platitude.",
  chips:["<b>Precise charting</b> · never generic","<b>Grounded in the classics</b> · sources you can check","<b>Birth data never stored</b>"],
  s1:"Your Birth Moment", s2:"Name Your Dilemma",
  lb1:"Birth date & hour <small>optional · e.g. 1995-03-14, Mao hour (5–7am); enables a precise chart</small>",
  lb2:"What are you torn about? <small>a job, a relationship, timing… the more specific, the sharper the reading</small>",
  go:"CAST", sealhint:"Read & burned · birth data never stored",
  rt:"READING · 判词", fbq:"Was this reading on point?",
  phBirth:"e.g. 1995-03-14, around 6am (optional — we can divine from the question alone)",
  phConcern:"e.g. I have an offer with better pay but it means leaving my city; my family objects and I can't decide…",
  foot:"MingXi offers life perspective through BaZi, I Ching and other traditional lenses. It is not medical, legal or investment advice. Your birth data and question are used for this reading only and never stored."
 }
};
function render(){
  const t=I18N[lang];
  document.documentElement.setAttribute("lang", lang==="Chinese"?"zh":"en");
  h1.innerHTML=t.h1; motto.textContent=t.motto; sub.textContent=t.sub;
  chips.innerHTML=t.chips.map(c=>`<span class="chip">${c}</span>`).join("");
  s1.textContent=t.s1; s2.textContent=t.s2;
  lb1.innerHTML=t.lb1; lb2.innerHTML=t.lb2;
  document.getElementById("go").textContent=t.go;
  sealhint.textContent=t.sealhint;
  rt.textContent=t.rt; fbq.textContent=t.fbq; foot.textContent=t.foot;
  document.getElementById("birth").placeholder=t.phBirth;
  document.getElementById("concern").placeholder=t.phConcern;
}
function toggleLang(){ lang = lang==="Chinese"?"English":"Chinese"; render(); }
render();
async function ask() {
  const btn = document.getElementById("go"), out = document.getElementById("out");
  btn.disabled = true; document.getElementById("report").classList.add("on");
  out.classList.add("cursor"); out.textContent = "";
  try {
    const resp = await fetch(window.APP_API + "/mingxi/ask_stream", {method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({payload: {birth: document.getElementById("birth").value,concern: document.getElementById("concern").value}, lang: lang})});
    const rd = resp.body.getReader(), dec = new TextDecoder(); let buf = "";
    while (true) {
      const {done, value} = await rd.read(); if (done) break;
      buf += dec.decode(value, {stream: true});
      let i; while ((i = buf.indexOf("\n\n")) >= 0) {
        const line = buf.slice(0, i).trim(); buf = buf.slice(i + 2);
        if (!line.startsWith("data: ")) continue;
        const d = JSON.parse(line.slice(6));
        if (d.token) out.textContent += d.token;
      }
    }
    document.getElementById("fbrow").style.display="block";
  } catch (e) { out.textContent = "Error: " + e; }
  out.classList.remove("cursor"); btn.disabled = false;
}
function fb(s) { fetch(window.APP_API + "/mingxi/feedback", {method: "POST",
  headers: {"Content-Type": "application/json"}, body: JSON.stringify({score: s})}); alert(lang==="Chinese"?"已收到，谢谢！":"Thanks!"); }
</script><script>try{fetch(window.APP_API+"/scout/api/visit?app_=mingxi&src="+(new URLSearchParams(location.search).get("src")||"")+"&ref="+encodeURIComponent(document.referrer))}catch(e){}</script></body></html>
