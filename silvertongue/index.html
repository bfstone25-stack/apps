<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>舌战 · Silvertongue</title><script src="config.js"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;overflow:hidden;font-family:-apple-system,'PingFang SC','Microsoft YaHei',Georgia,serif;color:#f0e9dd}
#app{position:fixed;inset:0;max-width:520px;margin:0 auto;display:flex;flex-direction:column;overflow:hidden}
#scene{position:absolute;inset:0;z-index:0;background:radial-gradient(120% 90% at 50% 8%,#3a2f2a 0%,#241d24 45%,#161018 100%);transition:background .8s}
.spot{position:absolute;top:-8%;left:50%;transform:translateX(-50%);width:340px;height:420px;background:radial-gradient(50% 55% at 50% 0,rgba(240,200,120,.22),transparent 70%);pointer-events:none;z-index:1}
.motes{position:absolute;inset:0;z-index:1;overflow:hidden;pointer-events:none}
.mote{position:absolute;bottom:-20px;border-radius:50%;background:radial-gradient(circle,#f5d493,transparent);opacity:.5;animation:rise linear infinite}
@keyframes rise{to{transform:translateY(-110vh)}}
.vig{position:absolute;inset:0;z-index:2;pointer-events:none;box-shadow:inset 0 0 150px 30px rgba(0,0,0,.6)}
.lang{position:absolute;top:12px;right:12px;z-index:30;background:rgba(255,255,255,.08);border:1px solid #5a4a3a;color:#c9b48f;border-radius:20px;padding:5px 12px;font-size:.8em;cursor:pointer}
/* 目标条 */
.obj{position:relative;z-index:5;margin:46px 16px 0;padding:11px 14px;background:linear-gradient(180deg,rgba(60,48,36,.8),rgba(40,32,26,.85));border:1px solid #5a4a36;border-left:3px solid #e0a94e;border-radius:8px;backdrop-filter:blur(4px)}
.day{color:#e0a94e;font-size:.72em;letter-spacing:2px;font-family:monospace}
.goal{font-size:1.12em;font-weight:700;margin-top:3px;color:#f5ecd9;line-height:1.4}
.diff{color:#b09668;font-size:.78em;margin-top:3px}
/* 立绘 */
.stage{position:relative;z-index:4;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60px}
.portrait{width:150px;height:150px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:4.6em;
  background:radial-gradient(circle at 42% 36%,rgba(255,244,224,.92),rgba(230,190,130,.25));
  box-shadow:0 0 0 5px rgba(240,210,150,.25),0 0 42px 6px rgba(224,169,78,.35),0 16px 40px rgba(0,0,0,.4);animation:bob 4.5s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
.cname{margin-top:12px;color:#d8c39a;font-size:.9em;letter-spacing:1px}
/* 对话框 */
.dbox{position:relative;z-index:6;margin:8px 12px 10px;padding:16px 16px 13px;border-radius:16px;min-height:120px;
  background:linear-gradient(180deg,rgba(34,26,30,.9),rgba(22,16,22,.94));border:1px solid #4a3c30;backdrop-filter:blur(8px);box-shadow:0 -4px 26px rgba(0,0,0,.4)}
.line{font-size:1.06em;line-height:1.6;min-height:52px;color:#efe6d6}
.cursor{display:inline-block;width:8px;background:#e0a94e;margin-left:2px;animation:blink .7s steps(1) infinite}
@keyframes blink{50%{opacity:0}}
.inrow{display:flex;gap:8px;margin-top:11px}
#inp{flex:1;background:#1a1418;border:1px solid #4a3c30;color:#efe6d6;border-radius:20px;padding:11px 15px;font-size:1em;font-family:inherit;outline:none}
#inp:focus{border-color:#e0a94e}
#send{background:linear-gradient(180deg,#e6b45c,#d0913c);border:0;border-radius:20px;padding:0 17px;color:#2a1c08;font-weight:800;font-size:1.05em;cursor:pointer;transition:.12s}
#send:active{transform:scale(.9)}#send:disabled{opacity:.4}
.bar{display:flex;justify-content:space-between;align-items:center;margin-top:9px}
.moves{font-family:monospace;font-size:.75em;color:#a89066;letter-spacing:1px}
.pips{display:flex;gap:3px}.pip{width:7px;height:7px;border-radius:50%;background:#3a3026}.pip.used{background:#e0a94e}
/* 结局 */
.end{position:absolute;inset:0;z-index:20;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;background:radial-gradient(circle at 50% 34%,rgba(60,44,20,.92),rgba(0,0,0,.95))}
.end h2{font-size:2em;letter-spacing:2px;margin:0 0 8px}
.grid{font-size:1.6em;letter-spacing:3px;margin:12px 0}
.burst{position:absolute;font-size:1.5em;animation:burst 1.1s ease-out forwards}
@keyframes burst{to{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}
.share{background:linear-gradient(180deg,#e6b45c,#d0913c);border:0;color:#2a1c08;border-radius:10px;padding:12px 26px;font-weight:800;cursor:pointer;font-size:1em}
/* 序幕 */
#introOv{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;background:rgba(10,8,4,.85);padding:22px;backdrop-filter:blur(3px)}
.intro-card{max-width:440px;width:100%;background:linear-gradient(180deg,#241a12,#171017);border:1px solid #5a4a36;border-top:3px solid transparent;border-radius:16px;padding:26px 24px 22px;box-shadow:0 0 60px rgba(224,169,78,.18),0 20px 50px rgba(0,0,0,.6);position:relative;overflow:hidden}
.intro-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#8a6a34,#f0cd88,#e0a94e,#8a6a34)}
.intro-title{font-size:1.5em;font-weight:800;letter-spacing:3px;color:#f0cd88;text-align:center;margin:4px 0 12px;text-shadow:0 0 18px rgba(240,205,136,.35)}
.intro-open{color:#d8c39a;font-size:.95em;line-height:1.7;text-align:center;margin-bottom:16px;font-style:italic}
.intro-rules{color:#c9b48f;font-size:.88em;line-height:1.75}
.intro-rules div{margin-bottom:7px}
.intro-rules b{color:#e0a94e;margin-right:6px}
.intro-go{display:block;width:100%;margin-top:18px;background:linear-gradient(180deg,#e6b45c,#d0913c);border:0;border-radius:12px;padding:13px;color:#2a1c08;font-weight:800;font-size:1.05em;cursor:pointer;letter-spacing:1px}
.intro-go:active{transform:scale(.97)}
.helpbtn{position:absolute;top:12px;left:12px;z-index:30;width:30px;height:30px;background:rgba(255,255,255,.08);border:1px solid #5a4a3a;color:#c9b48f;border-radius:50%;font-size:.9em;cursor:pointer}
</style></head><body>
<div id="app">
<div id="scene"></div><div class="spot"></div><div class="motes" id="motes"></div><div class="vig"></div>
<button class="lang" onclick="toggleLang()">中/EN</button>
<button class="helpbtn" onclick="showIntro()">?</button>
<div id="introOv"><div class="intro-card">
  <div class="intro-title" id="inTitle"></div>
  <div class="intro-open" id="inOpen"></div>
  <div class="intro-rules" id="inRules"></div>
  <button class="intro-go" id="inGo" onclick="closeIntro()"></button>
</div></div>
<div class="obj"><div class="day" id="day"></div><div class="goal" id="goal">…</div><div class="diff" id="diff"></div></div>
<div class="stage"><div class="portrait" id="portrait">🗣️</div><div class="cname" id="cname"></div></div>
<div class="dbox">
  <div class="line" id="line"></div>
  <div class="inrow"><input id="inp" placeholder="" enterkeyhint="send"><button id="send" onclick="say()">➤</button></div>
  <div class="bar"><span class="moves" id="moves"></span><div class="pips" id="pips"></div></div>
</div>
<div class="end" id="end"></div>
</div>
<script>
const API=window.SILVERTONGUE_API||window.APP_API||"";
const EMO={customs:"🛃",raise:"💼",guard:"💂",landlord:"🏠",cat:"🐈",investor:"📈",dragon:"🐉",teen:"🙄",barista:"☕",ai:"🤖",witness:"🫣",chef:"👨‍🍳",genie:"🧞",exlover:"💔"};
const HUE={customs:210,raise:35,guard:280,landlord:20,cat:150,investor:45,dragon:0,teen:320,barista:30,ai:190,witness:260,chef:15,genie:170,exlover:340};
let S=null,hist=[],turns=0,done=false,lang=navigator.language.startsWith("zh")?"zh":"en";
const T={en:{ph:"Say something…",moves:(u,b)=>`${u}/${b} lines`,diff:(d,n)=>`${"★".repeat(d)} · ${n} won today`,
  win:"Persuaded!",winsub:(n,p)=>`in ${n} line${n>1?"s":""}${p!=null?` · top ${p}%`:""}`,lost:"Out of words",
  lostsub:"A new challenge tomorrow",share:"Share",copied:"Copied — paste anywhere."},
 zh:{ph:"说点什么…",moves:(u,b)=>`${u}/${b} 句`,diff:(d,n)=>`${"★".repeat(d)} · 今日${n}人说服`,
  win:"说服成功！",winsub:(n,p)=>`用了${n}句${p!=null?` · 今日前${p}%`:""}`,lost:"次数用尽",
  lostsub:"明天再来新挑战",share:"分享战绩",copied:"已复制——粘贴到任何地方。"}};
function tr(){return T[lang]}
function motes(){const m=document.getElementById("motes");m.innerHTML="";for(let i=0;i<16;i++){const e=document.createElement("div");e.className="mote";const s=3+Math.random()*7;e.style.width=e.style.height=s+"px";e.style.left=Math.random()*100+"%";e.style.animationDuration=(8+Math.random()*10)+"s";e.style.animationDelay=(-Math.random()*14)+"s";m.appendChild(e);}}
async function load(){
 S=await (await fetch(API+"/state?lang="+lang)).json();
 const h=HUE[S.id]!=null?HUE[S.id]:35;
 document.getElementById("scene").style.background=`radial-gradient(120% 90% at 50% 8%,hsl(${h},28%,22%) 0%,hsl(${(h+300)%360},22%,13%) 50%,#120e14 100%)`;
 document.getElementById("day").textContent="DAY "+S.day;
 document.getElementById("goal").textContent=S.goal;
 document.getElementById("diff").textContent=tr().diff(S.difficulty,S.solved_today);
 document.getElementById("portrait").textContent=EMO[S.id]||"🗣️";
 document.getElementById("cname").textContent=S.character;
 document.getElementById("inp").placeholder=tr().ph;
 motes();updateBar();
 typeLine(lang==="zh"?"（"+S.character+"看着你，等你开口。）":"("+S.character+" looks at you, waiting.)");
}
function updateBar(){document.getElementById("moves").textContent=tr().moves(turns,S.max_turns);
 let p="";for(let i=0;i<S.max_turns;i++)p+=`<div class="pip ${i<turns?'used':''}"></div>`;document.getElementById("pips").innerHTML=p;}
let typing=null;
function typeLine(txt){clearInterval(typing);const el=document.getElementById("line");let i=0;const c='<span class="cursor">&nbsp;</span>';el.innerHTML=c;
 typing=setInterval(()=>{i++;el.innerHTML=txt.slice(0,i).replace(/[&<>]/g,x=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[x]))+(i<txt.length?c:"");if(i>=txt.length)clearInterval(typing);},24);}
async function say(){
 if(done||turns>=S.max_turns)return;const inp=document.getElementById("inp"),msg=inp.value.trim();if(!msg)return;
 inp.value="";document.getElementById("send").disabled=true;turns++;updateBar();
 typeLine(lang==="zh"?"（……）":"(…)");
 try{const r=await (await fetch(API+"/say",{method:"POST",headers:{"Content-Type":"application/json"},
   body:JSON.stringify({history:hist,message:msg,lang:lang,pid:pid()})})).json();
  hist.push({role:"user",content:msg});hist.push({role:"assistant",content:r.reply||"…"});
  typeLine(r.reply||"…");turns=r.turns||turns;updateBar();
  if(r.won){done=true;setTimeout(()=>win(r.turns),700);}
  else if(r.over){done=true;setTimeout(lose,700);}
 }catch(e){typeLine("(connection error)");}
 document.getElementById("send").disabled=false;
}
async function win(n){
 let pct=null;try{const p=await (await fetch(API+"/percentile?turns="+n)).json();pct=p.percentile;}catch(e){}
 const grid="🗣️".repeat(Math.max(n,1))+"✅";
 const e=document.getElementById("end");e.style.display="flex";
 e.innerHTML=`<h2 style="color:#e6b45c">${tr().win}</h2><div style="color:#c9b48f">${tr().winsub(n,pct)}</div>
   <div class="grid">${grid}</div><button class="share" onclick="share(${n},'${grid}')">${tr().share}</button>`;
 for(let i=0;i<20;i++){const b=document.createElement("div");b.className="burst";b.textContent=["✨","🌟","💫","⭐"][i%4];
   b.style.left="50%";b.style.top="42%";b.style.setProperty("--dx",(Math.random()*320-160)+"px");b.style.setProperty("--dy",(Math.random()*320-160)+"px");e.appendChild(b);setTimeout(()=>b.remove(),1100);}
}
function lose(){const e=document.getElementById("end");e.style.display="flex";
 e.innerHTML=`<h2 style="color:#b0684e">${tr().lost}</h2><div style="color:#8a7860">${tr().lostsub}</div>`;}
function share(n,grid){const txt=`舌战 Silvertongue · Day ${S.day}\n${S.goal}\n${grid}  ${lang==="zh"?n+"句":n+" lines"}\n${location.href.split("?")[0]}`;
 navigator.clipboard.writeText(txt);alert(tr().copied);}
function pid(){let p=localStorage.getItem("st_pid");if(!p){p=Math.random().toString(36).slice(2)+Date.now().toString(36);localStorage.setItem("st_pid",p);}return p;}
function toggleLang(){lang=lang==="zh"?"en":"zh";if(!done){hist=[];turns=0;done=false;document.getElementById("end").style.display="none";load();}}
document.getElementById("inp").addEventListener("keydown",e=>{if(e.key==="Enter")say();});
const INTRO={zh:{t:"舌战",o:"聚光灯亮起。对面的人不好说话——但每个人心里都有一扇门，钥匙是对的话。",
 r:["每日一局，说服眼前的角色自愿答应你的目标","真诚、共情、有理有据才有效——贿赂与威胁必败","独立裁判判定胜负，轮次越少越体面"],g:"上台"},
 en:{t:"SILVERTONGUE",o:"The spotlight is on. They won't budge easily—but everyone has a door, and the right words are the key.",
 r:["One duel a day: talk the character into willingly conceding your goal","Sincerity, empathy and sound logic work—bribes and threats never do","An independent judge calls it. Fewer turns, more style."],g:"Take the Stage"}};
function showIntro(){const i=INTRO[lang];
 document.getElementById("inTitle").textContent=i.t;
 document.getElementById("inOpen").textContent=i.o;
 document.getElementById("inRules").innerHTML=i.r.map(x=>`<div><b>◆</b>${x}</div>`).join("");
 document.getElementById("inGo").textContent=i.g;
 document.getElementById("introOv").style.display="flex";}
function closeIntro(){document.getElementById("introOv").style.display="none";localStorage.setItem("st_intro_seen","1");}
if(!localStorage.getItem("st_intro_seen"))showIntro();
load();
</script></body></html>
