<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>舌战 Silvertongue</title><script src="config.js"></script>
<style>
:root{--bg:#0f1117;--card:#1a1d27;--line:#2a2e3a;--gold:#f5c451;--green:#4ecb8d;--txt:#e8e8e3}
*{box-sizing:border-box}body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
max-width:560px;margin:0 auto;padding:16px;background:var(--bg);color:var(--txt);min-height:100vh}
.top{display:flex;justify-content:space-between;align-items:center}
h1{font-size:1.3em;margin:6px 0}.lang{background:none;border:1px solid var(--line);color:#999;border-radius:6px;padding:4px 10px;cursor:pointer}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin:10px 0}
.day{color:var(--gold);font-size:.85em;letter-spacing:1px}.goal{font-size:1.15em;font-weight:600;margin:6px 0}
.meta{color:#888;font-size:.85em}
#chat{margin:12px 0;min-height:120px}
.msg{margin:8px 0;padding:9px 13px;border-radius:14px;max-width:82%;line-height:1.5;white-space:pre-wrap}
.me{background:#2b4a6f;margin-left:auto;border-bottom-right-radius:4px}
.them{background:#242833;border-bottom-left-radius:4px}
.inrow{display:flex;gap:8px;margin-top:10px}
#inp{flex:1;background:#242833;border:1px solid var(--line);color:var(--txt);border-radius:20px;padding:11px 15px;font-size:1em}
#send{background:var(--gold);border:0;border-radius:20px;padding:0 18px;font-weight:700;cursor:pointer}
#send:disabled{opacity:.4}
.turns{text-align:center;color:#777;font-size:.85em;margin-top:6px}
.win{text-align:center;padding:20px}.win h2{color:var(--green)}
.grid{font-size:1.6em;letter-spacing:3px;margin:10px 0}
.share{background:var(--green);border:0;color:#08130d;border-radius:10px;padding:11px 20px;font-weight:700;cursor:pointer;font-size:1em}
.hint{color:#666;font-size:.8em;text-align:center;margin-top:14px}
</style></head><body>
<div class="top"><h1>舌战 · Silvertongue</h1><button class="lang" onclick="toggleLang()">中/EN</button></div>
<div class="card"><div class="day" id="day"></div><div class="goal" id="goal">…</div>
<div class="meta" id="meta"></div></div>
<div id="chat"></div>
<div id="area">
  <div class="inrow"><input id="inp" placeholder=""><button id="send" onclick="send()">➤</button></div>
  <div class="turns" id="turns"></div>
</div>
<div class="hint" id="hint"></div>
<script>
const API = (window.SILVERTONGUE_API || window.APP_API || "") ;
let lang = navigator.language.startsWith("zh") ? "zh" : "en";
let S = null, history = [], turns = 0, done = false;
const T = {
  en:{placeholder:"Say something…",turns:n=>`${n}/${S.max_turns} messages`,
      solved:n=>`difficulty ${"★".repeat(S.difficulty)} · ${n} solved today`,
      win:"Persuaded!",winsub:n=>`in ${n} message${n>1?"s":""}`,share:"Share result",
      lost:"Out of messages",lostsub:"Come back tomorrow for a new challenge",
      copied:"Copied! Paste it anywhere.",you:"You"},
  zh:{placeholder:"说点什么…",turns:n=>`${n}/${S.max_turns} 句`,
      solved:n=>`难度 ${"★".repeat(S.difficulty)} · 今日${n}人通关`,
      win:"说服成功！",winsub:n=>`用了 ${n} 句`,share:"分享战绩",
      lost:"次数用尽",lostsub:"明天再来挑战新关卡",
      copied:"已复制！粘贴到任何地方。",you:"你"}};
function tr(){return T[lang]}
async function load(){
  S = await (await fetch(API+"/state?lang="+lang)).json();
  document.getElementById("day").textContent = "DAY "+S.day;
  document.getElementById("goal").textContent = S.goal;
  document.getElementById("meta").textContent = tr().solved(S.solved_today);
  document.getElementById("inp").placeholder = tr().placeholder;
  render();
}
function render(){
  document.getElementById("chat").innerHTML = history.map(m=>
    `<div class="msg ${m.role==="user"?"me":"them"}">${esc(m.content)}</div>`).join("");
  document.getElementById("turns").textContent = tr().turns(turns);
  window.scrollTo(0,document.body.scrollHeight);
}
function esc(s){return s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]))}
async function send(){
  if(done) return;
  const inp=document.getElementById("inp"), msg=inp.value.trim(); if(!msg) return;
  inp.value=""; document.getElementById("send").disabled=true;
  history.push({role:"user",content:msg}); render();
  history.push({role:"assistant",content:"…"}); render();
  try{
    const r=await (await fetch(API+"/say",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({history:history.slice(0,-2),message:msg,lang:lang,pid:pid()})})).json();
    history.pop();
    history.push({role:"assistant",content:r.reply||"…"});
    turns=r.turns; render();
    if(r.won){ done=true; win(r.turns); }
    else if(r.over){ done=true; lose(); }
  }catch(e){ history.pop(); history.push({role:"assistant",content:"(connection error)"}); render(); }
  document.getElementById("send").disabled=false;
}
async function win(n){
  let pct=""; try{const p=await (await fetch(API+"/percentile?turns="+n)).json();
    if(p.percentile!=null) pct = lang==="zh"?`今日全球前 ${p.percentile}%`:`top ${p.percentile}% today`;}catch(e){}
  const grid="🗣️".repeat(n)+"✅";
  document.getElementById("area").innerHTML=
    `<div class="win"><h2>${tr().win}</h2><div>${tr().winsub(n)} · ${pct}</div>
     <div class="grid">${grid}</div>
     <button class="share" onclick="share(${n})">${tr().share}</button></div>`;
}
function lose(){document.getElementById("area").innerHTML=
  `<div class="win"><h2 style="color:#c66">${tr().lost}</h2><div>${tr().lostsub}</div></div>`;}
function share(n){
  const txt=`舌战 Silvertongue Day ${S.day}\n${S.goal}\n${"🗣️".repeat(n)}✅  ${n}${lang==="zh"?"句":" msgs"}\n${location.href.split("?")[0]}`;
  navigator.clipboard.writeText(txt); alert(tr().copied);
}
function pid(){let p=localStorage.getItem("st_pid"); if(!p){p=Math.random().toString(36).slice(2)+Date.now().toString(36); localStorage.setItem("st_pid",p);} return p;}
function toggleLang(){lang=lang==="zh"?"en":"zh"; if(!done){load();}}
document.getElementById("inp").addEventListener("keydown",e=>{if(e.key==="Enter")send();});
load();
</script></body></html>
