<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>破绽 · TELL</title><script src="config.js"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;overflow:hidden;font-family:'Georgia','Songti SC',-apple-system,serif;color:#d8d4cc;background:#080809}
#app{position:fixed;inset:0;max-width:520px;margin:0 auto;display:flex;flex-direction:column;overflow:hidden}
/* 雨夜氛围 */
#atmos{position:absolute;inset:0;z-index:0;background:radial-gradient(120% 80% at 50% -10%,#1c1e24 0%,#0d0e11 45%,#050506 100%)}
.rain{position:absolute;inset:0;z-index:1;overflow:hidden;pointer-events:none;opacity:.35}
.drop{position:absolute;top:-12%;width:1px;height:70px;background:linear-gradient(transparent,#8aa);animation:rain linear infinite}
@keyframes rain{to{transform:translateY(120vh)}}
.vig{position:absolute;inset:0;z-index:2;pointer-events:none;box-shadow:inset 0 0 160px 40px #000;background:radial-gradient(60% 50% at 50% 30%,transparent,rgba(0,0,0,.5))}
.lang{position:absolute;top:12px;right:12px;z-index:30;background:rgba(255,255,255,.06);border:1px solid #333;color:#998;border-radius:4px;padding:5px 11px;font-size:.78em;cursor:pointer;font-family:monospace}
/* 扩大小按钮触屏命中区至≥44px，不改视觉 */
.lang::after,.help::after{content:"";position:absolute;inset:-9px}
/* 卷宗 */
.dossier{position:relative;z-index:5;margin:44px 14px 8px;padding:14px 16px;background:linear-gradient(180deg,#16171b,#101114);border:1px solid #2a2c33;border-left:3px solid #a1332b;border-radius:3px;box-shadow:0 8px 30px rgba(0,0,0,.6)}
.stamp{position:absolute;top:-12px;right:12px;font-family:monospace;font-size:.62em;letter-spacing:2px;color:#a1332b;border:2px solid #a1332b;padding:2px 8px;border-radius:3px;transform:rotate(-6deg);opacity:.85}
.case{font-family:monospace;font-size:.66em;letter-spacing:3px;color:#7a7266}
.title{font-size:1.32em;font-weight:700;margin:3px 0 6px;color:#e9e4da;letter-spacing:1px}
.setup{font-size:.9em;line-height:1.55;color:#b6b1a6}
.vic{font-family:monospace;font-size:.72em;color:#8a8478;margin-top:7px;border-top:1px dashed #333;padding-top:6px}
/* 嫌疑人 mugshots */
.lineup{position:relative;z-index:5;display:flex;gap:8px;margin:8px 14px}
.mug{flex:1;cursor:pointer;text-align:center;padding:8px 4px 6px;border:1px solid #2a2c33;border-radius:4px;background:#111216;transition:.18s;position:relative}
.mug.on{border-color:#d4a24e;background:#191712;box-shadow:0 0 16px rgba(212,162,78,.25)}
.face{height:52px;border-radius:3px;background:repeating-linear-gradient(#26282e,#26282e 9px,#1d1f24 9px,#1d1f24 10px);display:flex;align-items:center;justify-content:center;font-size:1.9em;filter:grayscale(.4) contrast(1.1);margin-bottom:5px}
.mug .mn{font-weight:700;font-size:.9em;color:#ddd}
.mug .mr{font-size:.68em;color:#877f72}
/* 审讯台 */
.stage{position:relative;z-index:4;flex:1;display:flex;align-items:flex-end;justify-content:center;min-height:60px}
.spot{position:absolute;top:-30px;left:50%;transform:translateX(-50%);width:220px;height:230px;background:radial-gradient(50% 60% at 50% 0,rgba(212,162,78,.16),transparent 70%);pointer-events:none}
.subject{width:104px;height:104px;border-radius:4px;background:repeating-linear-gradient(#2a2c33,#2a2c33 12px,#212329 12px,#212329 13px);display:flex;align-items:center;justify-content:center;font-size:3.2em;filter:grayscale(.35) contrast(1.1);box-shadow:0 6px 26px rgba(0,0,0,.7),0 0 30px rgba(212,162,78,.1);margin-bottom:6px}
/* 对话框 */
.dbox{position:relative;z-index:6;margin:6px 12px 10px;padding:15px 16px 12px;background:linear-gradient(180deg,rgba(20,21,25,.94),rgba(14,15,18,.96));border:1px solid #2c2e35;border-radius:6px;min-height:118px;backdrop-filter:blur(4px)}
.who{position:absolute;top:-13px;left:16px;background:#a1332b;color:#f5ece6;font-weight:700;font-size:.82em;padding:3px 14px;border-radius:3px;letter-spacing:1px;font-family:-apple-system,'PingFang SC',serif}
.line{font-size:1.05em;line-height:1.62;min-height:50px;color:#e0dbd0}
.cursor{display:inline-block;width:8px;background:#d4a24e;margin-left:2px;animation:blink .7s steps(1) infinite}
@keyframes blink{50%{opacity:0}}
.inrow{display:flex;gap:8px;margin-top:11px}
#inp{flex:1;background:#0d0e11;border:1px solid #33353d;color:#e0dbd0;border-radius:4px;padding:11px 14px;font-size:1em;font-family:inherit;outline:none}
#inp:focus{border-color:#d4a24e}
#send{background:#d4a24e;border:0;border-radius:4px;padding:0 16px;min-width:52px;min-height:44px;color:#1a1400;font-weight:800;cursor:pointer;transition:.12s}
#send:active{transform:scale(.9)}#send:disabled{opacity:.4}
.bar{display:flex;justify-content:space-between;align-items:center;margin-top:9px}
.q{font-family:monospace;font-size:.74em;color:#8a8478;letter-spacing:1px}
.pips{display:flex;gap:3px}.pip{width:7px;height:7px;border-radius:50%;background:#333}.pip.used{background:#a1332b}
.accuse{width:100%;margin-top:11px;background:linear-gradient(180deg,#a1332b,#7d251f);color:#fff;border:0;border-radius:5px;padding:12px;font-size:1em;font-weight:700;cursor:pointer;letter-spacing:2px;font-family:-apple-system,'PingFang SC',serif}
.accuse:active{transform:scale(.98)}
/* 判决 */
.verdict{position:absolute;inset:0;z-index:20;display:none;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center;background:radial-gradient(circle at 50% 30%,rgba(30,20,15,.9),rgba(0,0,0,.96))}
.verdict h2{font-size:2.1em;letter-spacing:3px;margin:0 0 12px}
.grid{font-size:1.5em;letter-spacing:3px;margin:14px 0}
.share{background:#d4a24e;border:0;color:#1a1400;border-radius:5px;padding:12px 26px;font-weight:800;cursor:pointer;font-size:1em;letter-spacing:1px}
.rev{color:#b6b1a6;font-size:.92em;line-height:1.6;margin:6px 0;max-width:360px}
/* 反馈 feedback */
.fb{margin-top:18px;padding-top:14px;border-top:1px solid rgba(212,162,78,.25);width:100%;max-width:300px}
.fbq{color:#877f72;font-size:.82em;letter-spacing:1px;margin-bottom:8px}
.fbrow{display:flex;justify-content:center;gap:14px;align-items:center}
.fbe{background:rgba(255,255,255,.05);border:1px solid #33353d;border-radius:6px;padding:7px 13px;font-size:1.25em;cursor:pointer;transition:transform .1s,border-color .1s}
.fbe:hover,.fbe:active{border-color:#d4a24e;transform:scale(1.1)}
.fbin{flex:1;background:#15161a;border:1px solid #33353d;border-radius:5px;padding:8px 10px;color:#e9e4da;font-size:.85em;font-family:inherit;outline:none}
.fbin:focus{border-color:#d4a24e}
.back{position:absolute;top:12px;left:12px;z-index:8;background:rgba(255,255,255,.06);border:1px solid #333;color:#998;border-radius:4px;padding:5px 11px;font-size:.78em;cursor:pointer;font-family:monospace}
/* 序幕 intro */
.help{position:absolute;top:12px;right:88px;z-index:30;background:rgba(255,255,255,.06);border:1px solid #333;color:#998;border-radius:4px;padding:5px 11px;font-size:.78em;cursor:pointer;font-family:monospace}
#introOv{position:fixed;inset:0;z-index:80;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.85)}
.introCard{max-width:440px;width:100%;background:#0d0e11;border:1px solid #2a2c33;border-top:2px solid #d4a24e;border-radius:14px;padding:26px 24px 22px;color:#e9e4da;box-shadow:0 0 60px rgba(212,162,78,.12),0 20px 50px rgba(0,0,0,.8)}
.introCard h1{margin:0 0 12px;font-size:1.5em;letter-spacing:3px;color:#e9e4da}
.introCard .lede{color:#b6b1a6;font-size:.95em;line-height:1.65;margin-bottom:14px;font-style:italic}
.introCard .rule{color:#cfc9bd;font-size:.88em;line-height:1.6;margin:8px 0}
.introCard .rule b{color:#d4a24e;margin-right:6px}
.introGo{width:100%;margin-top:18px;background:linear-gradient(180deg,#d4a24e,#b3823a);border:0;border-radius:6px;padding:13px;color:#1a1400;font-weight:800;font-size:1em;letter-spacing:2px;cursor:pointer;font-family:inherit}
.introGo:active{transform:scale(.98)}
</style></head><body>
<div id="app">
<div id="atmos"></div><div class="rain" id="rain"></div><div class="vig"></div>
<button class="lang" onclick="toggleLang()">中/EN</button>
<button class="help" onclick="showIntro()">?</button>
<div id="introOv"><div class="introCard" id="introCard"></div></div>
<div class="dossier">
  <div class="stamp" id="stamp">CONFIDENTIAL</div>
  <div class="case" id="case">CASE FILE</div>
  <div class="title" id="title">…</div>
  <div class="setup" id="setup"></div>
  <div class="vic" id="vic"></div>
</div>
<div class="lineup" id="lineup"></div>
<div class="stage"><div class="spot"></div><div class="subject" id="subject">🕵</div></div>
<div class="dbox">
  <div class="who" id="who">…</div>
  <div class="line" id="line"></div>
  <div class="inrow"><input id="inp" placeholder="" enterkeyhint="send"><button id="send" onclick="send()">➤</button></div>
  <div class="bar"><span class="q" id="qcount"></span><div class="pips" id="pips"></div></div>
  <button class="accuse" id="accuseBtn" onclick="openAccuse()"></button>
</div>
<div class="verdict" id="verdict"></div>
</div>
<script>
const API=window.TELL_API||window.APP_API||"";
let lang=navigator.language.startsWith("zh")?"zh":"en";
let S=null,cur=null,convos={},qUsed=0,done=false;
const T={en:{ph:"Ask a question…",who:n=>n,q:(u,b)=>`INTERROGATION ${u}/${b}`,
  accuse:"⚖  MAKE THE ARREST",victim:"VICTIM",whoDunit:"Name the killer:",cancel:"‹ back",
  win:"CASE CLOSED",lose:"CASE COLD",solved:n=>`${n} cracked it today`,
  winsub:(n,p)=>`Cracked in ${n} question${n>1?"s":""}${p!=null?` · top ${p}%`:""}`,
  truth:c=>`The killer: ${c}`,share:"Share",copied:"Copied — paste anywhere."},
 zh:{ph:"审讯提问…",who:n=>n,q:(u,b)=>`审讯 ${u}/${b}`,
  accuse:"⚖  指认凶手",victim:"死者",whoDunit:"指认真凶：",cancel:"‹ 返回",
  win:"结案",lose:"悬案",solved:n=>`今日${n}人破案`,
  winsub:(n,p)=>`${n}问破案${p!=null?` · 今日前${p}%`:""}`,
  truth:c=>`真凶：${c}`,share:"分享",copied:"已复制——粘贴到任何地方。"}};
function tr(){return T[lang]}
function rain(){const r=document.getElementById("rain");r.innerHTML="";for(let i=0;i<40;i++){const d=document.createElement("div");d.className="drop";d.style.left=Math.random()*100+"%";d.style.animationDuration=(.4+Math.random()*.5)+"s";d.style.animationDelay=(-Math.random()*2)+"s";d.style.opacity=.2+Math.random()*.5;r.appendChild(d);}}
async function load(){
 S=await (await fetch(API+"/state?lang="+lang)).json();
 document.getElementById("case").textContent=`CASE ${String(S.day).padStart(3,"0")} · ${tr().solved(S.solved_today)}`;
 document.getElementById("title").textContent=S.title;
 document.getElementById("setup").textContent=S.setup;
 document.getElementById("vic").textContent=`${tr().victim}: ${S.victim}`;
 const faces=["🕴️","👤","🧥","🎭","💼"];
 document.getElementById("lineup").innerHTML=S.suspects.map((s,i)=>
   `<div class="mug" id="mug-${s.id}" onclick="pick('${s.id}')"><div class="face">${faces[i%faces.length]}</div><div class="mn">${s.name}</div><div class="mr">${s.role}</div></div>`).join("");
 document.getElementById("inp").placeholder=tr().ph;
 document.getElementById("accuseBtn").textContent=tr().accuse;
 S.suspects.forEach(s=>{if(!convos[s.id])convos[s.id]=[]});
 if(!cur)cur=S.suspects[0].id;
 pick(cur);
}
function pick(id){cur=id;S.suspects.forEach(s=>document.getElementById("mug-"+s.id).classList.toggle("on",s.id===id));
 const s=S.suspects.find(x=>x.id===id),i=S.suspects.indexOf(s);
 document.getElementById("subject").textContent=["🕴️","👤","🧥","🎭","💼"][i%5];
 document.getElementById("who").textContent=s.name+" · "+s.role;render();}
function render(){
 const c=convos[cur]||[],last=c[c.length-1];
 if(last&&last.role==="assistant")typeLine(last.content);
 else if(!c.length)typeLine(lang==="zh"?"（"+S.suspects.find(x=>x.id===cur).name+"抬眼看你，沉默着。）":"("+S.suspects.find(x=>x.id===cur).name+" looks up at you, silent.)");
 updateBar();
}
function updateBar(){document.getElementById("qcount").textContent=tr().q(qUsed,S.budget);
 let p="";for(let i=0;i<S.budget;i++)p+=`<div class="pip ${i<qUsed?'used':''}"></div>`;document.getElementById("pips").innerHTML=p;}
let typing=null;
function typeLine(txt){clearInterval(typing);const el=document.getElementById("line");let i=0;const cur='<span class="cursor">&nbsp;</span>';el.innerHTML=cur;
 typing=setInterval(()=>{i++;el.innerHTML=txt.slice(0,i).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]))+(i<txt.length?cur:"");if(i>=txt.length)clearInterval(typing);},22);}
async function send(){
 if(done||qUsed>=S.budget)return;const inp=document.getElementById("inp"),msg=inp.value.trim();if(!msg)return;
 inp.value="";document.getElementById("send").disabled=true;
 convos[cur].push({role:"user",content:msg});qUsed++;updateBar();
 typeLine(lang==="zh"?"（……）":"(…)");
 try{const r=await (await fetch(API+"/ask",{method:"POST",headers:{"Content-Type":"application/json"},
   body:JSON.stringify({suspect:cur,history:convos[cur].slice(0,-1),message:msg,lang:lang})})).json();
  convos[cur].push({role:"assistant",content:r.reply||"…"});typeLine(r.reply||"…");
 }catch(e){typeLine("(connection error)");}
 document.getElementById("send").disabled=false;
 if(qUsed>=S.budget){document.getElementById("inp").disabled=true;document.getElementById("send").disabled=true;}
}
function openAccuse(){if(done)return;
 const opts=S.suspects.map(s=>`<button class="accuse" style="background:#15161a;border:1px solid #33353d;color:#ddd;margin-top:8px;letter-spacing:1px" onclick="accuse('${s.id}')">${s.name} · ${s.role}</button>`).join("");
 const v=document.getElementById("verdict");v.style.display="flex";
 v.innerHTML=`<div style="font-weight:700;letter-spacing:2px;margin-bottom:6px">${tr().whoDunit}</div>${opts}<div style="margin-top:14px"><a href="#" onclick="closeAccuse();return false" style="color:#877f72">${tr().cancel}</a></div>`;}
function closeAccuse(){document.getElementById("verdict").style.display="none";}
async function accuse(id){done=true;
 const r=await (await fetch(API+"/accuse",{method:"POST",headers:{"Content-Type":"application/json"},
   body:JSON.stringify({suspect:id,questions:qUsed,lang:lang,pid:pid()})})).json();
 let pct=null;if(r.correct){try{const p=await (await fetch(API+"/percentile?questions="+qUsed)).json();pct=p.percentile;}catch(e){}}
 const grid=r.correct?("🔍".repeat(Math.max(qUsed,1))+"✅"):"🚬❌";
 const v=document.getElementById("verdict");v.style.display="flex";
 v.innerHTML=`<h2 style="color:${r.correct?'#d4a24e':'#a1332b'}">${r.correct?tr().win:tr().lose}</h2>
  <div class="rev">${tr().truth(r.culprit_name)}<br><span style="font-size:.9em;color:#8a8478">${r.reveal}</span></div>
  ${r.correct?`<div style="color:#b6b1a6;margin-top:6px">${tr().winsub(qUsed,pct)}</div><div class="grid">${grid}</div>
  <button class="share" onclick="share(${qUsed},'${grid}')">${tr().share}</button>`:
  `<div class="grid">${grid}</div><div style="color:#877f72;font-size:.85em">${lang==="zh"?"明天，新的案子。":"Tomorrow, a new case."}</div>`}${fbHtml()}`;}
// ── 游戏反馈 game feedback ──
function fbHtml(){
 if(!window.APP_API)return"";
 const today=new Date().toISOString().slice(0,10);
 if(localStorage.getItem("tell_fb_last")===today)return"";
 return `<div class="fb" id="fb"><div class="fbq">${lang==="zh"?"今天这案子怎么样？":"How was the case?"}</div>
  <div class="fbrow">${[["😍",3],["😐",2],["🥱",1]].map(([e,s])=>`<button class="fbe" onclick="fbPick(${s})">${e}</button>`).join("")}</div></div>`;}
function fbPick(score){
 const today=new Date().toISOString().slice(0,10);localStorage.setItem("tell_fb_last",today);
 window.__fbScore=score;
 const el=document.getElementById("fb");if(!el)return;
 el.innerHTML=`<div class="fbq" style="color:#d4a24e">${lang==="zh"?"谢谢！":"Thanks!"}</div>
  <div class="fbrow"><input class="fbin" id="fbNote" maxlength="200" placeholder="${lang==="zh"?"想说一句？（可选）":"One line? (optional)"}"><button class="fbe" style="font-size:.9em;color:#d4a24e" onclick="fbSend()">➤</button></div>`;
 fbPost(score,"");
 document.getElementById("fbNote").addEventListener("keydown",e=>{if(e.key==="Enter")fbSend();});}
function fbSend(){const el=document.getElementById("fbNote");const note=el?el.value.trim():"";
 if(note)fbPost(window.__fbScore,note);
 const f=document.getElementById("fb");if(f)f.innerHTML=`<div class="fbq" style="color:#d4a24e">${lang==="zh"?"已收到，明晚见。":"Noted. See you tomorrow night."}</div>`;}
function fbPost(score,note){try{fetch(window.APP_API+"/scout/api/game_feedback",{method:"POST",headers:{"Content-Type":"application/json"},
 body:JSON.stringify({game:"tell",score:score,note:note,pid:pid()})}).catch(()=>{});}catch(e){}}
function share(n,grid){const txt=`破绽 TELL · Case ${S.day}\n${S.title}\n${grid}  ${lang==="zh"?n+"问破案":n+" questions"}\n${location.href.split("?")[0]}`;
 navigator.clipboard.writeText(txt);alert(tr().copied);}
function pid(){let p=localStorage.getItem("tell_pid");if(!p){p=Math.random().toString(36).slice(2)+Date.now().toString(36);localStorage.setItem("tell_pid",p);}return p;}
function toggleLang(){lang=lang==="zh"?"en":"zh";if(!done)load();}
document.getElementById("inp").addEventListener("keydown",e=>{if(e.key==="Enter")send();});
// 移动端：软键盘弹出时保证对话框可见（visualViewport优先，退化为scrollIntoView）
(function(){const inp=document.getElementById("inp"),dbox=document.querySelector(".dbox");
 function reveal(){if(document.activeElement===inp)dbox.scrollIntoView({block:"end",behavior:"smooth"});}
 inp.addEventListener("focus",()=>setTimeout(reveal,300));
 if(window.visualViewport)visualViewport.addEventListener("resize",reveal);})();
const IT={zh:{h:"破绽",lede:"审讯室的灯只照着一把椅子。嫌疑人就坐在那里——案卷里没写的细节，只有凶手知道。",
 r:["每日一案，你是审讯官，自由提问。","嫌疑人会撒谎、绕圈、露馅——诱使TA说出“未公开的案情细节”。","抓到破绽后正式指控。问得越少，段位越高。"],go:"开始审讯"},
 en:{h:"TELL",lede:"One lamp. One chair. The suspect knows details that never made the papers—details only the killer could know.",
 r:["One case a day. You interrogate—ask anything.","The suspect lies, deflects, slips—bait them into revealing an unreleased detail.","Catch the tell, then accuse. Fewer questions, higher rank."],go:"Enter the Room"}};
function showIntro(){const t=IT[lang];
 document.getElementById("introCard").innerHTML=`<h1>${t.h}</h1><div class="lede">${t.lede}</div>`+
  t.r.map(x=>`<div class="rule"><b>◆</b>${x}</div>`).join("")+
  `<button class="introGo" onclick="closeIntro()">${t.go}</button>`;
 document.getElementById("introOv").style.display="flex";}
function closeIntro(){document.getElementById("introOv").style.display="none";localStorage.setItem("tell_intro_seen","1");}
rain();load();
if(!localStorage.getItem("tell_intro_seen"))showIntro();
</script></body></html>
